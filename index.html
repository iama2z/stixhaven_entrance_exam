      const getAC = () => {

        if (selectedArmor === "Heavy Armor") return 16; 
        if (selectedArmor === "Medium Armor") return 13 + Math.min(2, dexMod); 
        if (selectedArmor === "Light Armor") return 11 + dexMod; 
        return 10 + dexMod; 
      };

      const getGameDataForPhase = (phaseNum) => {

          phase: phaseNum,

          colleges: COLLEGES, 
          clubs: CLUBS, 
          currentClass: selectedClass,
          spellsByResonance: SPELLS_BY_RESONANCE
        };
      };

      const extractInlineOptions = (message) => {
        if (!message || typeof message !== "string") return [];
        const collected = [];
        const regex = /(?:^|\s)([A-H])[)\].:-]\s*([^\n]+?)(?=(?:\s+[A-H][)\].:-]\s*)|$)/gi;
        let match;
        while ((match = regex.exec(message)) !== null) {
          const optionText = (match[2] || "").replace(/\s+/g, " ").trim();
          if (optionText) collected.push(optionText);
          if (collected.length >= 8) break;
        }
        return collected;
      };

      const sanitizeOptionText = (value) => {
        if (typeof value !== "string") return "";
        return value
          .replace(/^\s*[A-Ha-h][)\].:-]\s*/, "")
          .replace(/\s+/g, " ")
          .trim();
      };

      const isGenericPlaceholderOption = (value) => {
        const normalized = sanitizeOptionText(value).toLowerCase();
        return /^(option|choice|answer)\s+[a-z0-9]+$/.test(normalized);
      };

      const shouldOpenCustomInput = (value) => {
        const normalized = sanitizeOptionText(value).toLowerCase();
        return CUSTOM_INPUT_TRIGGERS.has(normalized);
      };

      const stripInlineOptions = (text) => {
        if (!text || typeof text !== "string") return text || "";
        // Match uppercase option markers (A) B) etc.); require index > 0 to preserve question text before options
        const markers = [...text.matchAll(/\s+[A-H][).:-]\s/g)];
        if (markers.length >= 2 && markers[0].index > 0) {
          return text.slice(0, markers[0].index).trim();
        }
        return text;
      };

      const normalizeAssessmentPayload = (response, fallbackPhase) => {
        const rawAssessment = response && typeof response.assessment === "object" ? response.assessment : {};
        const rawQuestion = typeof rawAssessment.question === "string" ? rawAssessment.question.trim() : "";
        const proctorMessage = typeof response?.proctorMessage === "string" ? response.proctorMessage.trim() : "";
        const rawComposedQuestion = rawQuestion || proctorMessage || "The Proctor awaits your answer.";

        const explicitOptions = (Array.isArray(rawAssessment.options) ? rawAssessment.options : [])
          .map(opt => typeof opt === "string" ? opt : (opt && typeof opt.text === "string" ? opt.text : ""))
          .map(sanitizeOptionText)
          .filter(Boolean)
          .filter(opt => !isGenericPlaceholderOption(opt));

        const inlineOptions = extractInlineOptions(rawComposedQuestion)
          .map(sanitizeOptionText)
          .filter(Boolean)
          .filter(opt => !isGenericPlaceholderOption(opt));

        let options = explicitOptions.length ? explicitOptions : inlineOptions;
        const parsedExpectedCount = Number(rawAssessment.expectedOptionCount);
        const expectedOptionCount = Number.isFinite(parsedExpectedCount)
          ? Math.max(0, Math.min(8, parsedExpectedCount))
          : options.length;

        const seen = new Set();
        const deduped = [];
        for (const option of options) {
          const key = option.toLowerCase();
          if (!seen.has(key)) {
            seen.add(key);
            deduped.push(option);
          }
        }

        let normalizedOptions = deduped;

        if (expectedOptionCount > 0 && normalizedOptions.length > expectedOptionCount) {
          normalizedOptions = normalizedOptions.slice(0, expectedOptionCount);
        }

        const answerType = ["single-choice", "multi-choice", "text"].includes(rawAssessment.answerType)
          ? rawAssessment.answerType
          : (normalizedOptions.length ? "single-choice" : "text");

        const hasQuestionIndex = Number.isFinite(Number(rawAssessment.questionIndex));
        const phaseNumber = Number.isFinite(Number(rawAssessment.phaseNumber))
          ? Math.max(1, Math.min(12, Number(rawAssessment.phaseNumber)))
          : fallbackPhase;

        // Strip inline option labels (A) B) C) ...) from question text when option buttons are shown
        const question = normalizedOptions.length >= 2
          ? stripInlineOptions(rawComposedQuestion)
          : rawComposedQuestion;

        // Show proctorMessage as a contextual hint when a separate assessment.question exists
        const proctorHint = rawQuestion && proctorMessage && rawQuestion !== proctorMessage
          ? proctorMessage
          : "";

        return {
          phaseNumber,
          questionIndex: hasQuestionIndex ? Math.max(1, Number(rawAssessment.questionIndex)) : null,
          hasQuestionIndex,
          stepId: typeof rawAssessment.stepId === "string" && rawAssessment.stepId.trim()
            ? rawAssessment.stepId.trim()
            : `phase-${phaseNumber}-q`,
          question,
          proctorHint,
          answerType: normalizedOptions.length ? answerType : "text",
          expectedOptionCount,
          options: normalizedOptions
        };
      };

      const applyAssessmentFromResponse = (response, fallbackPhase) => {
        const normalized = normalizeAssessmentPayload(response, fallbackPhase);
        setIsCustomInputOpen(false);
        setAssessmentState(prev => {
          const phaseNumber = normalized.phaseNumber || fallbackPhase;
          const questionIndex = phaseNumber === prev.phaseNumber
            ? prev.questionIndex + 1
            : 1;
          const resolvedQuestionIndex = normalized.hasQuestionIndex ? normalized.questionIndex : questionIndex;
          const resolvedOptions = normalized.options;
          const resolvedAnswerType = resolvedOptions.length >= 2 ? normalized.answerType : "text";
          return {
            ...normalized,
            phaseNumber,
            questionIndex: resolvedQuestionIndex,
            stepId: normalized.stepId || `phase-${phaseNumber}-q${questionIndex}`,

                    <span className="text-slate-500">{cantrips.length} / {expectedCantrips}</span>
                  </p>
                  {cantrips.map(s => (
                    <div key={s} className="flex justify-between items-center bg-white/80 p-1.5 rounded border border-[#2c2214]/10 mb-1 text-xs font-semibold">
                      {s} <button onClick={() => handleRemoveSpell(s)} className="text-red-500 hover:text-red-700"><i className="fa-solid fa-times"></i></button>
                    </div>
                  ))}
                  {Array.from({ length: missingCantrips }).map((_, i) => (
                    <select key={`c-${i}`} onChange={handleAddSpell} value="" className="w-full bg-red-900/5 border border-red-900/20 text-red-900 rounded p-1.5 mb-1 text-xs outline-none cursor-pointer">
                      <option value="" disabled>+ Empty Cantrip Slot...</option>
                      {validSpellOptions.filter(s => s.level === "Cantrip").map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                    </select>
                  ))}
                </div>

                <div>
                  <p className="text-xs font-bold text-slate-700 mb-2 flex justify-between">
                    <span>1st-Level Spells</span>
                    <span className="text-slate-500">{leveled.length + unclassified.length} / {expectedSpells}</span>
                  </p>
                  {[...leveled, ...unclassified].map(s => (
                    <div key={s} className="flex justify-between items-center bg-white/80 p-1.5 rounded border border-[#2c2214]/10 mb-1 text-xs font-semibold">
                      {s} <button onClick={() => handleRemoveSpell(s)} className="text-red-500 hover:text-red-700"><i className="fa-solid fa-times"></i></button>
                    </div>
                  ))}
                  {Array.from({ length: missingSpells }).map((_, i) => (
                    <select key={`s-${i}`} onChange={handleAddSpell} value="" className="w-full bg-red-900/5 border border-red-900/20 text-red-900 rounded p-1.5 mb-1 text-xs outline-none cursor-pointer">
                      <option value="" disabled>+ Empty 1st-Level Slot...</option>
                      {validSpellOptions.filter(s => s.level === "1st-level").map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                    </select>
                  ))}
                </div>

                <div className="text-[10px] text-slate-500 italic mt-3 bg-slate-900/5 p-2 rounded">
                  <i className="fa-solid fa-circle-info mr-1 text-indigo-400"></i>
                  {isSpellcaster
                    ? "Slot capacity includes Level 1 Class mechanics plus the +2 Cantrips and +1 Spell granted by the Strixhaven Initiate background feat."
                    : "Your class has no innate spellcasting. No spell slots are required."}
                </div>
              </div>
            );
          }

          case 4: return (
            <div className="space-y-4 text-xs">
              <div>
                <p className="font-bold text-amber-950 text-sm border-b border-[#2c2214] pb-1 mb-2">Campus Life & Employment</p>
                <div className="grid grid-cols-1 gap-2">
                  <p><span className="font-bold text-slate-700">Extracurricular Club:</span> {CLUBS[selectedClub]?.name || selectedClub || "None"}</p>
                  <p><span className="font-bold text-slate-700">Campus Job:</span> {selectedJob || "Unemployed"}</p>
                  <p><span className="font-bold text-slate-700">Stipend Kit:</span> {STIPEND_KITS[selectedStipend]?.name || "None"}</p>
                </div>
              </div>
              
              <div>
                <p className="font-bold text-amber-950 text-sm border-b border-[#2c2214] pb-1 mb-2">Relationships</p>
                <div className="grid grid-cols-1 gap-2 bg-white/50 p-3 rounded-lg border border-[#2c2214]/10">
                  <p><span className="font-bold text-emerald-700"><i className="fa-solid fa-handshake mr-1"></i> Friend:</span> {friend || "TBD"}</p>
                  <p><span className="font-bold text-red-700"><i className="fa-solid fa-khanda mr-1"></i> Rival:</span> {rival || "TBD"}</p>
                </div>
              </div>

              <div>
                <p className="font-bold text-amber-950 text-sm border-b border-[#2c2214] pb-1 mb-2">Proficiencies</p>
                <div className="grid grid-cols-1 gap-2">
                  <p><span className="font-bold text-slate-700">Languages:</span> Common, {selectedLanguage}</p>
                  <p><span className="font-bold text-slate-700">Armor Focus:</span> {selectedArmor}</p>
                  <p><span className="font-bold text-slate-700">Proficiency Bonus:</span> +2</p>
                </div>
              </div>
            </div>
          );
          case 5: return (
            <div className="space-y-4">
              <div>
                <p className="text-xs uppercase tracking-[0.18em] text-slate-500 font-semibold mb-2">Full Transcript</p>
                <p className="text-xs text-slate-600 leading-relaxed mb-3">
                  This is the complete exam conversation, including written responses and any questions you asked the proctor.
                </p>
              </div>

              <div className="space-y-2">
                {chatHistory.length === 0 && (
                  <div className="text-xs text-slate-500 italic bg-white/60 rounded-lg border border-[#2c2214]/10 p-3">
                    No transcript has been recorded yet.
                  </div>
                )}

                {chatHistory.map((msg, i) => (
                  <div key={i} className={`text-sm rounded-lg px-3 py-2 border ${
                    msg.role === "user"
                      ? "bg-amber-500/10 border-amber-500/30 text-amber-100"
                      : "bg-indigo-500/10 border-indigo-500/30 text-indigo-100"
                  }`}>
                    <span className="text-[10px] uppercase font-bold tracking-[0.18em] opacity-80 block mb-1">
                      {msg.role === "user" ? "You" : "Proctor"}
                    </span>
                    <span className="whitespace-pre-wrap leading-relaxed">{msg.text}</span>
                  </div>
                ))}

                {isChatLoading && (
                  <div className="text-sm rounded-lg px-3 py-2 border bg-indigo-500/10 border-indigo-500/30 text-indigo-200 italic">
                    <i className="fa-solid fa-ellipsis fa-fade mr-1"></i>Proctor is preparing the next prompt...
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>
            </div>
          );
          default: return null;
        }
      };

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
            <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] pointer-events-none"></div>
            <div className="max-w-md w-full bg-slate-950 border border-amber-500/30 rounded-2xl p-8 shadow-2xl relative z-10">
              <div className="text-center mb-8">
                <i className="fa-solid fa-wand-magic-sparkles text-3xl text-amber-500 mb-3"></i>
                <h1 className="text-2xl font-bold tracking-wider text-amber-400 font-serif">STRIXHAVEN</h1>
                <p className="text-xs text-slate-400 tracking-widest uppercase mt-2">Student Portal Access</p>
              </div>

              <div className="flex gap-2 mb-6 bg-slate-900 p-1 rounded-lg">
                <button onClick={() => {setLoginMode('new'); setAuthError('');}} className={`flex-1 py-2 text-xs font-semibold rounded-md transition-all ${loginMode === 'new' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>New Enrollment</button>
                <button onClick={() => {setLoginMode('returning'); setAuthError('');}} className={`flex-1 py-2 text-xs font-semibold rounded-md transition-all ${loginMode === 'returning' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Returning Student</button>
              </div>

              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">Student ID (Username)</label>
                  <input type="text" value={portalUsername} onChange={e => setPortalUsername(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-100 focus:border-amber-500 outline-none" placeholder="e.g. RazorToe" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">Password</label>
                  <input type="password" value={portalPassword} onChange={e => setPortalPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-100 focus:border-amber-500 outline-none" placeholder="••••••••" />
                </div>
                
                {authError && <div className="text-red-400 text-xs font-bold bg-red-950/50 p-3 rounded border border-red-900/50">{authError}</div>}
                
                <button type="submit" disabled={isAuthLoading} className="w-full py-3 mt-4 bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-slate-950 rounded-lg text-sm font-bold shadow-lg transition-all">
                  {isAuthLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : (loginMode === 'new' ? "Begin Entrance Exam" : "Resume Studies")}
                </button>
              </form>
            </div>

            {/* LOGIN SCREEN VERSION NUMBER */}
            <div className="absolute bottom-2 left-3 text-[10px] text-slate-500 font-mono pointer-events-none z-50 opacity-50">
              v1.8.2 - AI instructions updated to ask only one question at a time
            </div>

          </div>
        );
      }

      return (
        <div className="h-screen relative z-10 bg-gradient-to-b from-slate-950 via-slate-950 to-indigo-950 text-slate-100 overflow-hidden">
          <header className="px-4 md:px-6 py-4 border-b border-indigo-800/40 bg-slate-950/80 backdrop-blur-md flex items-center justify-between">
            <div className="flex items-center gap-2">
              <button
                onClick={() => setIsSheetDrawerOpen(true)}
                className="w-10 h-10 rounded-lg border border-indigo-500/40 bg-indigo-500/10 hover:bg-indigo-500/20 transition-all text-indigo-200"
                aria-label="Open character sheet"
              >
                <i className="fa-solid fa-bars"></i>
              </button>
              <button
                onClick={() => setIsQuestionsOpen(true)}
                className="h-10 px-3 rounded-lg border border-amber-500/40 bg-amber-500/10 hover:bg-amber-500/20 transition-all text-amber-200 text-xs md:text-sm font-semibold whitespace-nowrap"
                aria-label="Open questions chat"
              >
                <i className="fa-solid fa-circle-question mr-2"></i>I have questions
              </button>
            </div>

            <div className="text-center">
              <h1 className="text-xl md:text-2xl font-bold tracking-wider text-amber-400 font-serif">
                <i className="fa-solid fa-wand-magic-sparkles mr-2 text-amber-500"></i>STRIXHAVEN
              </h1>
              <p className="text-[11px] text-slate-400 tracking-[0.2em] uppercase mt-0.5">
                Proctor Exam • Phase {phase} of 12
              </p>
            </div>

            <div className="text-right">
              <span className="text-[10px] text-slate-500 uppercase block">Student ID</span>
              <span className="text-xs font-bold text-indigo-300">{portalUsername}</span>
            </div>
          </header>

          <main className="h-[calc(100vh-81px)] px-4 md:px-6 py-4 md:py-6 flex justify-center">
            <div className="w-full max-w-5xl flex flex-col min-h-0">
              <div className="w-full bg-slate-800/80 h-2 rounded-full overflow-hidden mb-4 border border-slate-700/70">
                <div className="bg-gradient-to-r from-indigo-500 via-violet-500 to-amber-500 h-full transition-all duration-500" style={{ width: `${(phase / 12) * 100}%` }}></div>
              </div>
              {renderAssessmentPanel()}
            </div>
          </main>

          <div className={`fixed inset-0 bg-slate-950/70 backdrop-blur-sm transition-opacity z-40 ${isSheetDrawerOpen ? "opacity-100 pointer-events-auto" : "opacity-0 pointer-events-none"}`}
            onClick={() => setIsSheetDrawerOpen(false)}
          />
          <aside className={`fixed top-0 left-0 h-full w-[min(92vw,520px)] bg-slate-900 border-r border-indigo-700/50 shadow-2xl z-50 transition-transform duration-300 ${isSheetDrawerOpen ? "translate-x-0" : "-translate-x-full"} flex flex-col`}>
            <div className="px-4 py-3 border-b border-slate-700/70 flex items-center justify-between">
              <h2 className="text-sm font-semibold tracking-[0.18em] uppercase text-indigo-200">Character Sheet</h2>
              <button
                onClick={() => setIsSheetDrawerOpen(false)}
                className="w-8 h-8 rounded-md border border-slate-700 text-slate-300 hover:text-white hover:border-indigo-400 transition-all"
                aria-label="Close character sheet"
              >
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>

            <div className="px-4 pt-3 pb-2 flex gap-2 border-b border-slate-800 flex-wrap">
              {[{ id: 1, label: "Core Stats" }, { id: 2, label: "Backstory" }, { id: 3, label: "Spellbook" }, { id: 4, label: "Campus" }, { id: 5, label: "Transcript" }].map(tab => (
                <button key={tab.id} onClick={() => setActiveSheetTab(tab.id)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${activeSheetTab === tab.id ? "bg-amber-500 text-slate-950" : "bg-slate-950 text-slate-400 border border-slate-700 hover:border-amber-500/40"}`}>
                  {tab.label}
                </button>
              ))}
            </div>

            <div className="flex-1 p-4 overflow-y-auto">
              <div className="h-full bg-[#fdfaf2] text-[#2c2214] p-5 rounded-2xl border-4 border-[#ded1ba] overflow-y-auto shadow-inner">
                {renderSheet()}
              </div>
            </div>

            <div className="px-4 py-3 border-t border-slate-700/80 flex gap-2 justify-end">
              <button onClick={downloadCharacterSheet} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-xs font-semibold shadow-lg transition-all">
                <i className="fa-solid fa-file-arrow-down mr-2"></i>Download
              </button>
              <button onClick={() => submitToFirebase(false)} disabled={isSaving} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white rounded-lg text-xs font-semibold shadow-lg transition-all">
                <i className="fa-solid fa-cloud-arrow-up mr-2"></i>{isSaving ? "Syncing..." : "Force Sync"}
              </button>
            </div>
          </aside>

          <div className={`fixed inset-0 bg-slate-950/70 backdrop-blur-sm transition-opacity z-[55] ${isQuestionsOpen ? "opacity-100 pointer-events-auto" : "opacity-0 pointer-events-none"}`}
            onClick={() => setIsQuestionsOpen(false)}
          />
          <section className={`fixed inset-x-4 md:inset-x-auto md:right-6 md:top-6 bottom-4 md:bottom-auto md:w-[min(92vw,620px)] max-h-[calc(100vh-2rem)] bg-slate-900 border border-amber-500/30 shadow-2xl rounded-2xl z-[60] transition-all duration-300 ${isQuestionsOpen ? "opacity-100 translate-y-0 pointer-events-auto" : "opacity-0 translate-y-4 pointer-events-none"} flex flex-col`}>
            <div className="px-4 py-3 border-b border-slate-700/70 flex items-center justify-between gap-3">
              <div>
                <h2 className="text-sm font-semibold tracking-[0.18em] uppercase text-amber-200">I have questions</h2>
                <p className="text-[11px] text-slate-400 mt-1">Ask follow-ups, clarify a prompt, or change direction without leaving the exam.</p>
              </div>
              <button
                onClick={() => setIsQuestionsOpen(false)}
                className="w-8 h-8 rounded-md border border-slate-700 text-slate-300 hover:text-white hover:border-amber-400 transition-all flex-shrink-0"
                aria-label="Close questions chat"
              >
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>

            <div className="flex-1 min-h-0 p-4 overflow-y-auto">
              <div className="space-y-2 pr-1">
                {chatHistory.length === 0 && (
                  <div className="text-sm text-slate-400 bg-slate-950/40 border border-slate-700/60 rounded-xl p-4">
                    No transcript yet. Your questions will appear here as part of the live conversation.
                  </div>
                )}

                {chatHistory.map((msg, i) => (
                  <div key={i} className={`text-sm rounded-xl px-3 py-2 border ${
                    msg.role === "user"
                      ? "bg-amber-500/10 border-amber-500/30 text-amber-100"
                      : "bg-indigo-500/10 border-indigo-500/30 text-indigo-100"
                  }`}>
                    <span className="text-[10px] uppercase font-bold tracking-[0.18em] opacity-80 block mb-1">
                      {msg.role === "user" ? "You" : "Proctor"}
                    </span>
                    <span className="whitespace-pre-wrap leading-relaxed">{msg.text}</span>
                  </div>
                ))}

                {isChatLoading && (
                  <div className="text-sm rounded-xl px-3 py-2 border bg-indigo-500/10 border-indigo-500/30 text-indigo-200 italic">
                    <i className="fa-solid fa-ellipsis fa-fade mr-1"></i>Proctor is preparing the next prompt...
                  </div>
                )}

                <div ref={questionsEndRef} />
              </div>
            </div>

            <div className="px-4 pb-4 pt-3 border-t border-slate-700/70">
              <div className="flex gap-2">
                <input
                  ref={questionsChatInputRef}
                  type="text"
                  value={chatInput}
                  onChange={e => setChatInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleChatSubmit()}
                  placeholder="Ask the proctor anything..."
                  className="flex-1 bg-slate-950 border border-amber-700/60 rounded-lg px-4 py-3 text-sm text-amber-100 focus:border-amber-400 outline-none placeholder:text-amber-800"
                />
                <button
                  onClick={() => handleChatSubmit()}
                  disabled={isChatLoading || !chatInput.trim()}
                  className="px-5 py-3 bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-slate-950 rounded-lg text-sm font-semibold shadow transition-all whitespace-nowrap"
                >
                  {isChatLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : <><i className="fa-solid fa-paper-plane mr-2"></i>Send</>}
                </button>
              </div>
            </div>
          </section>

          <div className="fixed bottom-2 left-3 text-[10px] text-slate-500 font-mono pointer-events-none z-30 opacity-50">
            v1.9.0 - Assessment Card + Drawer UI
          </div>
        </div>
      );
    }

    // Wait for Babel to finish compiling, then clear the boot screen and render the app!
    const rootElement = document.getElementById('root');
    rootElement.innerHTML = ''; 
    ReactDOM.createRoot(rootElement).render(<App />);
  </script>
</body>
</html>
