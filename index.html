    async function initializePlayerSession() {
      try {
        const userCredential = await signInAnonymously(auth);
        console.log("✓ Authenticated with Strixhaven Cloud. Student UID:", userCredential.user.uid);
        window.studentUid = userCredential.user.uid;
      } catch (error) {
        console.warn("⚠️ Firebase Auth blocked or offline. Switching to Local Session Mode.", error.message);
        let localUid = localStorage.getItem("strixhaven_local_uid");
        if (!localUid) {
          localUid = "offline_student_" + Math.random().toString(36).substr(2, 9);
          localStorage.setItem("strixhaven_local_uid", localUid);
        }
        console.log("✓ Local Sandbox Session Active. Student UID:", localUid);
        window.studentUid = localUid;
      }
    }

        if (updates.resonanceType != null) setResonanceType(updates.resonanceType);
        if (updates.selectedSpells != null) setSelectedSpells(updates.selectedSpells);
        if (updates.selectedSkills != null) setSelectedSkills(updates.selectedSkills);
        if (updates.alignment != null) setAlignment(updates.alignment);
        if (updates.flaw != null) setFlaw(updates.flaw);
        if (updates.characterName != null) setCharacterName(updates.characterName);
        if (updates.playerName != null) setPlayerName(updates.playerName);
        if (updates.backstory != null) setBackstory(updates.backstory);
      };

      const getLowestStat = () => {
        let low = null; let lowVal = Infinity;
        for (const [s, v] of Object.entries(statAssignments)) {
          if (v !== null && v < lowVal) { lowVal = v; low = s; }
        }
        return low;
      };

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatHistory, isChatLoading]);

      useEffect(() => {
        if (hasInitialized.current) return;
        hasInitialized.current = true;
        
        const initConversation = async () => {
          setIsChatLoading(true);
          const initPrompt = "Introduce yourself as the Proctor and ask the Phase 1 question.";
          const gameData = getGameDataForPhase(1);
          try {
            const response = await window.askAdmissionsAI([], initPrompt, gameData);
            const proctorMsg = response.proctorMessage || response.response || "Welcome to the Strixhaven Biblioplex.";
            setChatHistory([{ role: 'proctor', text: proctorMsg }]);
            if (response.systemUpdates) applySystemUpdates(response.systemUpdates);
          } catch (err) {
            console.error("Init error:", err);
            setChatHistory([{ role: 'proctor', text: 'Welcome to the Strixhaven Biblioplex. I am your Admissions Proctor. Let us begin your entrance exam. How do you perceive your place in the multiverse? A) Through your own keen senses (Owlin) B) By observing the flow of magic (Elf/Gnome) C) Through connections with others (Human/Tiefling) D) By enduring hardship (Dwarf/Orc)' }]);
          }
          setIsChatLoading(false);
        };
        initConversation();
      }, []);

      const submitToFirebase = async () => {
        if (!window.firebaseDb || !window.studentUid) { alert("Database disconnected."); return; }
        setIsSaving(true);
        try {
          await window.firestoreSetDoc(window.firestoreDoc(window.firebaseDb, "student_enrollments", window.studentUid), {
            characterName, playerName, selectedLineage, selectedSize, selectedCollege, selectedClass,
            selectedClub, selectedStipend, selectedTool, selectedWeapon, alignment, statAssignments, selectedSkills, 
            selectedSpells, resonanceType, selectedTrait, selectedIdeal, selectedBond, flaw, backstory,
            customJobs, npcRelationships, lastUpdated: new Date().toISOString()
          }, { merge: true });
          alert("Student File submitted to Strixhaven Cloud!");
        } catch (e) { console.error(e); alert("Failed to save. Check console."); }
        setIsSaving(false);
      };
      
      const downloadCharacterSheet = () => {
        const content = `
=========================================
STRIXHAVEN UNIVERSITY - OFFICIAL TRANSCRIPT
=========================================
Student Name: ${characterName || "Unnamed Student"}
Lineage: ${selectedLineage} (${selectedSize})
Class: ${selectedClass}
College: ${selectedCollege}
Alignment: ${alignment}

--- CORE ATTRIBUTES ---
STR: ${getScore('STR')} (${getModStr('STR')})
DEX: ${getScore('DEX')} (${getModStr('DEX')})
CON: ${getScore('CON')} (${getModStr('CON')})
INT: ${getScore('INT')} (${getModStr('INT')})
WIS: ${getScore('WIS')} (${getModStr('WIS')})
CHA: ${getScore('CHA')} (${getModStr('CHA')})

--- ACADEMICS & EXTRACURRICULARS ---
Club: ${CLUBS[selectedClub]?.name || "None"}
Skills: ${selectedSkills.join(", ")}
Tool Focus: ${selectedTool}
Equipment: ${selectedWeapon}, ${STIPEND_KITS[selectedStipend]?.name}

--- MAGIC & SPELLS ---
Spellcasting Ability: ${getSpellAbility()}
Spell Save DC: ${getSpellSaveDC()}
Known Spells: ${selectedSpells.join(", ")}

--- PERSONALITY PROFILE ---
Flaw: ${flaw}
`;
        const blob = new Blob([content.trim()], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${(characterName || "Strixhaven_Student").replace(/\s+/g, '_')}_Sheet.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleChatSubmit = async () => {
        if (!chatInput.trim() || isChatLoading) return;
        const userMsg = chatInput.trim();
        setChatInput('');
        const newHistory = [...chatHistory, { role: 'user', text: userMsg }];
        setChatHistory(newHistory);
        setIsChatLoading(true);

        const gameData = getGameDataForPhase(phase);

        try {
          const response = await window.askAdmissionsAI(newHistory, userMsg, gameData);
          const proctorMsg = response.proctorMessage || response.response || 'The Proctor nods thoughtfully...';
          setChatHistory(prev => [...prev, { role: 'proctor', text: proctorMsg }]);
          if (response.systemUpdates) applySystemUpdates(response.systemUpdates);
        } catch {
          setChatHistory(prev => [...prev, { role: 'proctor', text: 'The Biblioplex archives are currently unreachable. Please try again later.' }]);
        }
        setIsChatLoading(false);
      };

      const renderChat = () => (
        <>
          <div className="flex-1 overflow-y-auto space-y-3 pr-1">
            {chatHistory.map((msg, i) => (
              <div key={i} className={`flex items-start ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                {msg.role === 'proctor' && (
                  <div className="w-6 h-6 rounded-full bg-indigo-900 border border-indigo-500/40 flex items-center justify-center mr-2 flex-shrink-0 mt-0.5">
                    <i className="fa-solid fa-hat-wizard text-indigo-400 text-[8px]"></i>
                  </div>
                )}
                <div className={`max-w-[80%] px-3 py-2 rounded-xl text-xs leading-relaxed whitespace-pre-wrap ${
                  msg.role === 'user'
                    ? 'bg-amber-500/20 border border-amber-500/30 text-amber-100 rounded-tr-sm'
                    : 'bg-indigo-950/60 border border-indigo-500/20 text-indigo-100 rounded-tl-sm'
                }`}>
                  {msg.role === 'proctor' && <span className="text-[9px] font-bold text-indigo-400 uppercase tracking-wider block mb-1">Proctor</span>}
                  {msg.text}
                </div>
                {msg.role === 'user' && (
                  <div className="w-6 h-6 rounded-full bg-amber-900 border border-amber-500/40 flex items-center justify-center ml-2 flex-shrink-0 mt-0.5">
                    <i className="fa-solid fa-user-graduate text-amber-400 text-[8px]"></i>
                  </div>
                )}
              </div>
            ))}
            {isChatLoading && (
              <div className="flex items-start">
                <div className="w-6 h-6 rounded-full bg-indigo-900 border border-indigo-500/40 flex items-center justify-center mr-2 flex-shrink-0 mt-0.5">
                  <i className="fa-solid fa-hat-wizard text-indigo-400 text-[8px]"></i>
                </div>
                <div className="bg-indigo-950/60 border border-indigo-500/20 px-3 py-2 rounded-xl rounded-tl-sm text-xs text-indigo-300 italic">
                  <i className="fa-solid fa-ellipsis fa-fade mr-1 text-indigo-400"></i>Proctor is writingâ€¦
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>
          <div className="flex gap-2 mt-3 pt-3 border-t border-indigo-900/40 flex-shrink-0">
            <input
              type="text"
              value={chatInput}
              onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleChatSubmit()}
              placeholder="Speak to the Admissions Proctorâ€¦"
              className="flex-1 bg-slate-950 border border-indigo-900/50 rounded-lg px-3 py-2 text-xs text-indigo-100 focus:border-indigo-500 outline-none placeholder:text-indigo-800"
            />
            <button
              onClick={handleChatSubmit}
              disabled={isChatLoading || !chatInput.trim()}
              className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white rounded-lg text-xs font-semibold shadow transition-all whitespace-nowrap"
            >
              {isChatLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : <><i className="fa-solid fa-paper-plane mr-1"></i>Send</>}
            </button>
          </div>
        </>
      );

      const renderSheet = () => {
        const college = COLLEGES[selectedCollege] || {};
        const cls     = CLASSES[selectedClass]    || {};

        switch (activeSheetTab) {
          case 1: return (
            <div className="space-y-4">
              <div className="border-b-2 border-[#2c2214] pb-3">
                <h2 className="text-lg font-bold font-serif">{characterName || "Unnamed Student"}</h2>
                <p className="text-xs text-[#66543b] mt-0.5">{cls.name || "â€”"} 1 Â· {selectedCollege} Â· {selectedLineage} Â· {alignment}</p>
              </div>
              <div className="grid grid-cols-3 gap-2">
                {["STR","DEX","CON","INT","WIS","CHA"].map(stat => {
                  const score = statAssignments[stat];
                  const mod = score !== null ? Math.floor((score - 10) / 2) : null;
                  return (
                    <div key={stat} className="border-2 rounded-xl p-2 bg-[#f9f5eb] text-center shadow-sm border-[#2c2214]">
                      <span className="text-[8px] font-bold text-slate-500 uppercase">{stat}</span>
                      <span className="text-sm font-extrabold block text-amber-900">{mod !== null ? (mod >= 0 ? `+${mod}` : mod) : "â€”"}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
          case 2: return <div className="text-xs font-serif leading-relaxed">{backstory || "No backstory."}</div>;
          case 3: return (
            <div className="space-y-3">
              <h3 className="text-sm font-bold font-serif text-amber-900 border-b border-[#2c2214] pb-1">Spellbook</h3>
              {selectedSpells.map(s => <div key={s} className="bg-white/80 p-1.5 rounded border border-[#2c2214]/10 mb-1 text-xs font-semibold">{s}</div>)}
            </div>
          );
          case 4: return (
            <div className="space-y-3 text-xs">
              <p className="font-bold text-amber-950">{CLUBS[selectedClub]?.name || "No club"}</p>
              <p className="text-slate-600">Stipend: {STIPEND_KITS[selectedStipend]?.name}</p>
            </div>
          );
          default: return null;
        }
      };

      return (
        <div className="flex flex-col lg:flex-row h-screen">
          {/* LEFT: PROCTOR CHAT â€” Sole driver of the application */}
          <section className="w-full lg:w-1/2 border-r border-slate-800 flex flex-col bg-slate-900/40 overflow-hidden">
            <div className="px-4 md:px-6 pt-4 md:pt-6 flex-shrink-0">
              <header className="mb-4 border-b border-amber-500/30 pb-4">
                <h1 className="text-xl font-bold tracking-wider text-amber-400 font-serif">
                  <i className="fa-solid fa-wand-magic-sparkles mr-2 text-amber-500"></i>STRIXHAVEN UNIVERSITY
                </h1>
                <p className="text-xs text-slate-400 tracking-widest uppercase mt-0.5">
                  Admissions Proctor â€” Phase {phase} of 11
                </p>
                <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mt-2">
                  <div className="bg-gradient-to-r from-indigo-600 to-indigo-400 h-full transition-all duration-500" style={{ width: `${(phase / 11) * 100}%` }}></div>
                </div>
              </header>
            </div>

            <div className="flex-1 flex flex-col overflow-hidden px-4 md:px-6 pb-4 pt-1">
              <div className="text-[10px] text-indigo-400/60 uppercase tracking-wider pb-2 flex items-center gap-2 flex-shrink-0">
                <i className="fa-solid fa-circle-dot fa-beat text-indigo-500/70 text-[8px]"></i>
                Live Session â€” Phase {phase} active
              </div>
              {renderChat()}
            </div>

            {/* Submit & Download buttons on Phase 11 */}
            {phase >= 11 && (
              <div className="flex-shrink-0 px-4 md:px-6 py-4 border-t border-slate-800/80 flex justify-end gap-3">
                <button onClick={downloadCharacterSheet} className="px-5 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-xs font-semibold shadow-lg transition-all">
                  <i className="fa-solid fa-file-arrow-down mr-2"></i>Download Sheet
                </button>
                <button onClick={submitToFirebase} disabled={isSaving} className="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white rounded-lg text-xs font-semibold shadow-lg transition-all">
                  <i className="fa-solid fa-cloud-arrow-up mr-2"></i>{isSaving ? "Syncing..." : "Submit Enrollment"}
                </button>
              </div>
            )}
          </section>

          {/* RIGHT: CHARACTER SHEET */}
          <section className="w-full lg:w-1/2 p-4 md:p-6 bg-slate-800/30 flex flex-col gap-3 overflow-y-auto">
            <div className="flex gap-2 border-b border-slate-800 pb-3">
              {[{ id: 1, label: "Core Stats" }, { id: 2, label: "Backstory" }, { id: 3, label: "Spellbook" }, { id: 4, label: "Campus" }].map(tab => (
                <button key={tab.id} onClick={() => setActiveSheetTab(tab.id)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${activeSheetTab === tab.id ? "bg-amber-500 text-slate-950" : "bg-slate-950 text-slate-400 border border-slate-800 hover:border-amber-500/40"}`}>
                  {tab.label}
                </button>
              ))}
            </div>
            <div className="flex-1 bg-[#fdfaf2] text-[#2c2214] p-5 rounded-2xl border-4 border-[#ded1ba] overflow-y-auto shadow-inner">
              {renderSheet()}
            </div>
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
