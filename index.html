    const auth = getAuth(app);

    // Expose database utilities to the global window so React can access them
    window.firebaseDb = db;

    // Run silent player authentication on page load
    async function initializePlayerSession() {
      try {
        const userCredential = await signInAnonymously(auth);
        console.log("✓ Authenticated with Strixhaven Cloud. Student UID:", userCredential.user.uid);
        window.studentUid = userCredential.user.uid;
      } catch (error) {
        console.warn("⚠️ Firebase Auth blocked or offline. Switching to Local Session Mode.", error.message);
        let localUid = localStorage.getItem("strixhaven_local_uid");
        if (!localUid) {
          localUid = "offline_student_" + Math.random().toString(36).substr(2, 9);
          localStorage.setItem("strixhaven_local_uid", localUid);
        }
        console.log("✓ Local Sandbox Session Active. Student UID:", localUid);
        window.studentUid = localUid;
      }
    }

        Witherbloom: ["Thornvine", "Mosswhisper", "Dewthorn", "Rotleaf", "Ivysong", "Mulch"],
        Lorehold: ["Stonearch", "Dustwhisper", "Archaeon", "Relic", "Vaultkeeper", "Carven"],
        default: ["Stardust", "Prismway", "Wandermere", "Brightquill", "Lorewright", "Aethon"]
      },
      ironic: {
        label: "😅 Ironic / Flaw-Contrast Names",
        DEX: ["Grace", "Nimble", "Swift", "Fleetfoot", "Sure-Step", "Airy"],
        STR: ["Atlas", "Boulder", "Ironside", "Grit", "Hefty", "Titan"],
        CON: ["Endure", "Stalwart", "Tireless", "Oakhart", "Steadfast", "Ironlung"],
        INT: ["Scholar", "Sage", "Bright", "Luminary", "Summa", "Prodigy"],
        WIS: ["Oracle", "Foresight", "Serenity", "Clairvoyant", "Aware", "Mindful"],
        CHA: ["Allure", "Heartwarming", "Magnetic", "Radiant", "Charming", "Vivid"],
        default: ["Serendipity", "Fortuna", "Brilliance", "Ironwill", "Destiny", "Triumph"]
      }
    };

    // ─── APP COMPONENT ────────────────────────────────────────────────────────────

    function App() {
      const [phase, setPhase] = useState(1);
      const [activeSheetTab, setActiveSheetTab] = useState(1);
      const [isSaving, setIsSaving] = useState(false);

      // Phase 1: Lineage & Size
      const [selectedLineage, setSelectedLineage] = useState("Human");
      const [selectedSize, setSelectedSize] = useState("Medium");

      // Phase 2: Class
      const [selectedClass, setSelectedClass] = useState("Bard");

      // Phase 3: College
      const [selectedCollege, setSelectedCollege] = useState("Prismari");

      // Phase 4: Club
      const [selectedClub, setSelectedClub] = useState("Fine Artists");

      // Phase 5: Stats — Standard Array
      const [statAssignments, setStatAssignments] = useState({ STR: null, DEX: null, CON: null, INT: null, WIS: null, CHA: null });
      const [pendingValue, setPendingValue] = useState(null);

      // Phase 6: Tool / Instrument
      const [selectedTool, setSelectedTool] = useState("");

      // Phase 7: Equipment
      const [selectedStipend, setSelectedStipend] = useState("Star Performer");
      const [selectedWeapon, setSelectedWeapon] = useState("");

      // Phase 8: Arcane Tuning
      const [resonanceType, setResonanceType] = useState(null);
      const [selectedSpells, setSelectedSpells] = useState([]);

      // Phase 9: Skills
      const [selectedSkills, setSelectedSkills] = useState([]);

      // Phase 10: Disposition
      const [alignment, setAlignment] = useState("Neutral Good");
      const [selectedTrait, setSelectedTrait] = useState(PERSONALITY_TRAITS[0]);
      const [selectedIdeal, setSelectedIdeal] = useState(IDEALS[0]);
      const [selectedBond, setSelectedBond] = useState(BONDS[0]);
      const [flaw, setFlaw] = useState("");

      // Phase 11: Enrollment
      const [characterName, setCharacterName] = useState("");
      const [playerName, setPlayerName] = useState("");
      const [backstory, setBackstory] = useState("");
      const [showNameBuckets, setShowNameBuckets] = useState(false);

      // Campus extras
      const [customJobs] = useState({ employer: "Firejolt Café", coworker: "Tavern Keep" });
      const [npcRelationships] = useState([
        { name: "Rosie Wirthmore", points: 1, relationship: "Art Class Buddy" }
      ]);

      // ─── MATH HELPERS ──────────────────────────────────────────────────────────

      const getScore  = (stat) => statAssignments[stat] ?? 10;
      const getMod    = (stat) => Math.floor((getScore(stat) - 10) / 2);
      const getModStr = (stat) => { const m = getMod(stat); return m >= 0 ? `+${m}` : `${m}`; };
      const allAssigned = () => Object.values(statAssignments).every(v => v !== null);
      const getAC  = () => ["Fighter","Barbarian","Paladin"].includes(selectedClass) ? 16 : 10 + getMod("DEX");
      const getMaxHP = () => (CLASSES[selectedClass]?.hitDie || 8) + getMod("CON");
      const getSpellAbility = () => COLLEGES[selectedCollege]?.spellcastingAbility || "INT";
      const getSpellSaveDC = () => 8 + 2 + getMod(getSpellAbility());
      const getSpellAtk    = () => { const m = getMod(getSpellAbility()); return m >= 0 ? `+${2 + m}` : `${2 + m}`; };

      // ─── STATS PHASE LOGIC ─────────────────────────────────────────────────────

      const getAvailableValues = () => {
        const used = [];
        for (const v of Object.values(statAssignments)) { if (v !== null) used.push(v); }
        return STANDARD_ARRAY.filter(v => {
          const i = used.indexOf(v);
          if (i !== -1) { used.splice(i, 1); return false; }
          return true;
        });
      };

      const handleValueChip = (val) => {
        setPendingValue(pendingValue === val ? null : val);
      };

      const handleStatBox = (stat) => {
        if (pendingValue !== null) {
          const old = statAssignments[stat];
          setStatAssignments({ ...statAssignments, [stat]: pendingValue });
          setPendingValue(old);
        } else if (statAssignments[stat] !== null) {
          setStatAssignments({ ...statAssignments, [stat]: null });
        }
      };

      const getStatHints = () => {
        if (!allAssigned()) return [];
        const hints = [];
        const primary = CLASSES[selectedClass]?.primary;
        const spellAbility = getSpellAbility();
        for (const stat of Object.keys(statAssignments)) {
          const score = statAssignments[stat];
          const mod = getMod(stat);
          if (stat === primary && score >= 15)
            hints.push({ type: "star",    text: `⭐ ${STAT_LABELS[stat]} ${score} (${getModStr(stat)}) — Exceptional primary attribute for ${selectedClass}! Your spells will hit harder.` });
          else if (stat === spellAbility && stat !== primary && score >= 14)
            hints.push({ type: "college", text: `🎓 ${STAT_LABELS[stat]} ${score} (${getModStr(stat)}) — Strong spellcasting stat for ${selectedCollege} college.` });
          if (score <= 8)
            hints.push({ type: "warning", text: `⚠️ ${STAT_LABELS[stat]} ${score} (${getModStr(stat)}) — Proctor Alert: This will create significant vulnerabilities in ${stat === "DEX" ? "ranged/stealth situations" : stat === "CON" ? "hit points and concentration checks" : "related skill checks"}.` });
        }
        return hints;
      };

      const getLowestStat = () => {
        let low = null; let lowVal = Infinity;
        for (const [s, v] of Object.entries(statAssignments)) {
          if (v !== null && v < lowVal) { lowVal = v; low = s; }
        }
        return low;
      };

      // Auto-set flaw when entering Phase 10
      useEffect(() => {
        const low = getLowestStat();
        if (low && FLAWS_BY_STAT[low]) setFlaw(FLAWS_BY_STAT[low]);
      }, [phase]);

      // Auto-reset weapon when class changes
      useEffect(() => { setSelectedWeapon(""); }, [selectedClass]);

      // Auto-reset tool when class changes
      useEffect(() => { setSelectedTool(""); }, [selectedClass]);

      // ─── SPELL FILTER ──────────────────────────────────────────────────────────

      const getSpellsForClass = (resonance) => {
        if (!resonance) return [];
        const cls = selectedClass;
        const col = selectedCollege;
        return SPELLS_BY_RESONANCE[resonance].filter(s =>
          s.classes.includes(cls) || s.classes.includes(col) || s.classes.includes("All")
        );
      };

      const getProctorSpellHint = (resonance) => {
        const dexMod = getMod("DEX");
        const conMod = getMod("CON");
        if (!resonance) return null;
        if (resonance === "Destruction") {
          if (dexMod <= -1) return "⚠️ Proctor Tip: With low Dexterity, avoid front-line melee confrontations. Prioritize long-range spells and elevation — let enemies come to you.";
          return "⭐ Proctor Tip: Destruction spells scale with your spellcasting modifier. Prioritize your highest stat for maximum impact.";
        }
        if (resonance === "Control") {
          if (conMod <= -1) return "⚠️ Proctor Tip: Concentration spells are risky with low Constitution. Prioritize non-concentration control spells like Thunderwave to stay mobile.";
          return "🎓 Proctor Tip: Control spells can turn the entire course of an encounter. One well-placed Entangle can neutralize a whole flank.";
        }
        if (resonance === "Harmony") return "✨ Proctor Tip: Support spells create cascading advantages for your entire party. A well-timed Bless can be worth more than any damage spell.";
        return null;
      };

      // ─── SKILL TIERS ───────────────────────────────────────────────────────────

      const ACADEMIC_SKILLS = new Set(["Arcana", "History", "Investigation", "Insight", "Perception", "Religion", "Nature"]);

      const getSkillTier = (skill) => {
        const mod = getMod(skill.stat);
        if (mod >= 2) return "star";
        if (ACADEMIC_SKILLS.has(skill.name)) return "academic";
        if (mod <= -1) return "risk";
        return "neutral";
      };

      const tierLabel = { star: "⭐ Optimal — High Stat Synergy", academic: "🧠 Solid Academic", risk: "⚠️ High-Risk — Stat Penalty", neutral: "Balanced" };
      const tierOrder = ["star", "academic", "neutral", "risk"];

      // ─── FIREBASE ──────────────────────────────────────────────────────────────

      const seedDatabase = async () => {
        if (!window.firebaseDb) return alert("Database not connected!");
        try {
          const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
          const db = window.firebaseDb;
          for (const [key, data] of Object.entries(COLLEGES))  await setDoc(doc(db, "colleges",  key), data);
          for (const [key, data] of Object.entries(LINEAGES))  await setDoc(doc(db, "lineages",  key), data);
          for (const [key, data] of Object.entries(CLASSES))   await setDoc(doc(db, "classes",   key), data);
          alert("Library Seeding Complete!");
        } catch (e) { console.error(e); alert("Upload failed. Check console."); }
      };

      const submitToFirebase = async () => {
        if (!window.firebaseDb || !window.studentUid) { alert("Database disconnected."); return; }
        setIsSaving(true);
        try {
          const { setDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
          await setDoc(doc(window.firebaseDb, "student_enrollments", window.studentUid), {
            characterName, playerName, selectedLineage, selectedSize, selectedCollege, selectedClass,
            selectedClub, selectedStipend, selectedTool, selectedWeapon, alignment,
            statAssignments, selectedSkills, selectedSpells, resonanceType,
            selectedTrait, selectedIdeal, selectedBond, flaw, backstory,
            customJobs, npcRelationships, lastUpdated: new Date().toISOString()
          }, { merge: true });
          alert("Student File submitted to Strixhaven Cloud!");
        } catch (e) { console.error(e); alert("Failed to save. Check console."); }
        setIsSaving(false);
      };

      // ─── NAVIGATION ────────────────────────────────────────────────────────────

      const handleNext = () => { if (phase < 11) setPhase(phase + 1); };
      const handlePrev = () => { if (phase > 1)  setPhase(phase - 1); };

      // ─── PHASE RENDER ──────────────────────────────────────────────────────────

      const renderPhase = () => {
        const lineage  = LINEAGES[selectedLineage]  || {};
        const cls      = CLASSES[selectedClass]     || {};
        const college  = COLLEGES[selectedCollege]  || {};
        const club     = CLUBS[selectedClub]        || {};
        const toolData = TOOLS_BY_CLASS[selectedClass] || { label: "Tool / Kit", options: [] };

        switch (phase) {
          /* ── PHASE 1: LINEAGE & SIZE ── */
          case 1: return (
            <div className="space-y-4">
              <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                "Welcome, prospective student. Before we can proceed with your academic evaluation, the university registry requires that we document your biological lineage. Please state your species and, where applicable, your physical scale."
              </div>
              <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-dna mr-2"></i>Phase 1: Core Lineage & Size</h3>
              <div className="grid grid-cols-3 gap-2">
                {Object.keys(LINEAGES).map(key => (
                  <button key={key} onClick={() => { setSelectedLineage(key); const l = LINEAGES[key]; setSelectedSize(l.sizeOptions[0]); }}
                    className={`p-3 rounded-xl border text-left transition-all ${selectedLineage === key ? "bg-amber-500/10 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 hover:border-amber-500/40"}`}>
                    <p className="font-bold text-amber-400 text-xs">{key}</p>
                    <p className="text-[9px] text-slate-400 mt-0.5">{LINEAGES[key].sizeOptions.join(" / ")}</p>
                  </button>
                ))}
              </div>
              {lineage.sizeOptions && lineage.sizeOptions.length > 1 && (
                <div>
                  <p className="text-xs text-amber-300 font-semibold mb-2">Select Physical Scale:</p>
                  <div className="flex gap-2">
                    {lineage.sizeOptions.map(sz => (
                      <button key={sz} onClick={() => setSelectedSize(sz)}
                        className={`px-4 py-2 rounded-lg text-xs font-bold border ${selectedSize === sz ? "bg-amber-500/20 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 text-slate-400"}`}>
                        {sz}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {lineage.traits && (
                <div className="bg-slate-900/60 p-3 rounded-xl border border-slate-700 space-y-1.5">
                  <p className="text-[10px] uppercase font-bold text-amber-500 tracking-wider">Species Traits</p>
                  {lineage.traits.map((t, i) => <p key={i} className="text-xs text-slate-300">• {t}</p>)}
                  {lineage.darkvision > 0 && <p className="text-xs text-slate-300">• Darkvision: {lineage.darkvision} ft.</p>}
                  {lineage.speed && <p className="text-xs text-slate-300">• Speed: {lineage.speed} ft.</p>}
                </div>
              )}
              {lineage.proctorHint && (
                <div className="bg-amber-950/30 border border-amber-500/30 rounded-xl p-3 text-xs text-amber-200">
                  <span className="font-bold text-amber-400">📋 Proctor Hint: </span>{lineage.proctorHint}
                </div>
              )}
            </div>
          );

          /* ── PHASE 2: CLASS ── */
          case 2: return (
            <div className="space-y-4">
              <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                "Every student arrives with an academic specialty. Which martial or arcane discipline defines your primary training? This will determine your combat resilience, weapon proficiencies, and spellcasting framework."
              </div>
              <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-medal mr-2"></i>Phase 2: Core Class Selection</h3>
              <div className="grid grid-cols-2 gap-2">
                {Object.keys(CLASSES).map(key => {
                  const c = CLASSES[key];
                  return (
                    <button key={key} onClick={() => setSelectedClass(key)}
                      className={`p-3 rounded-xl border text-left transition-all ${selectedClass === key ? "bg-amber-500/10 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 hover:border-amber-500/40"}`}>
                      <p className="font-bold text-amber-400 text-xs">{c.name}</p>
                      <p className="text-[9px] text-slate-500">d{c.hitDie} HP · {c.primary} primary</p>
                    </button>
                  );
                })}
              </div>
              {cls.name && (
                <div className="bg-slate-900/60 p-3 rounded-xl border border-slate-700 space-y-1.5">
                  <p className="text-[10px] uppercase font-bold text-amber-500 tracking-wider">{cls.name} — Class Details</p>
                  <p className="text-xs text-slate-300">• Hit Die: d{cls.hitDie}</p>
                  <p className="text-xs text-slate-300">• Primary Attribute: {STAT_LABELS[cls.primary]}</p>
                  <p className="text-xs text-slate-300">• Saving Throws: {cls.saves.map(s => STAT_LABELS[s]).join(", ")}</p>
                  <p className="text-xs text-slate-300">• Starting Weapons: {cls.weapons.join(", ")}</p>
                  <p className="text-xs text-slate-400 italic mt-1">{cls.description}</p>
                </div>
              )}
            </div>
          );

          /* ── PHASE 3: COLLEGE ── */
          case 3: return (
            <div className="space-y-4">
              <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                "Strixhaven is divided into five distinct colleges, each representing a unique philosophical and magical tradition. Your college will provide your background proficiencies, a magical feat, and your narrative identity on campus."
              </div>
              <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-book-open mr-2"></i>Phase 3: Campus College Alignment</h3>
              <div className="space-y-2">
                {Object.keys(COLLEGES).map(key => {
                  const c = COLLEGES[key];
                  return (
                    <button key={key} onClick={() => setSelectedCollege(key)}
                      className={`w-full p-3 rounded-xl border text-left transition-all ${selectedCollege === key ? "bg-amber-500/10 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 hover:border-amber-500/40"}`}>
                      <div className="flex items-center gap-2">
                        <i className={`fa-solid ${c.icon} text-amber-400 w-4`}></i>
                        <p className="font-bold text-amber-400 text-xs">{c.name}</p>
                      </div>
                      <p className="text-[10px] text-slate-400 italic mt-0.5 ml-6">"{c.motto}"</p>
                      <p className="text-[10px] text-slate-500 mt-0.5 ml-6">Skills: {c.skills.join(", ")} · Feat: {c.feat}</p>
                    </button>
                  );
                })}
              </div>
              {college.name && (
                <div className="bg-amber-950/30 border border-amber-500/30 rounded-xl p-3 text-xs text-amber-200">
                  <p className="font-bold text-amber-400 mb-1">📋 {college.name} Enrollment Package</p>
                  <p>• Textbook: <span className="text-amber-300">{college.primer}</span></p>
                  <p>• College Spells: <span className="text-amber-300">{college.spells.join(", ")}</span></p>
                  <p>• Spellcasting Ability: <span className="text-amber-300">{STAT_LABELS[college.spellcastingAbility]}</span></p>
                </div>
              )}
            </div>
          );

          /* ── PHASE 4: CLUBS ── */
          case 4: return (
            <div className="space-y-4">
              <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                "Beyond academic work, Strixhaven students are expected to participate in campus life. Your extracurricular activity will earn you a Student Die (d4) — a bonus die for specific skill checks on school grounds."
              </div>
              <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-users mr-2"></i>Phase 4: Extracurricular Activities</h3>
              <div className="space-y-2">
                {Object.keys(CLUBS).map(key => {
                  const c = CLUBS[key];
                  return (
                    <button key={key} onClick={() => setSelectedClub(key)}
                      className={`w-full p-3 rounded-xl border text-left transition-all ${selectedClub === key ? "bg-amber-500/10 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 hover:border-amber-500/40"}`}>
                      <p className="font-bold text-xs">{c.name}</p>
                      <p className="text-[10px] text-slate-400 mt-0.5">{c.description}</p>
                      <p className="text-[10px] text-emerald-400 mt-0.5">Bonus Skills: {c.skills.join(", ")} · Contact: {c.npc}</p>
                    </button>
                  );
                })}
              </div>
              {club.name && (
                <div className="bg-emerald-950/30 border border-emerald-500/30 rounded-xl p-3 text-xs text-emerald-200">
                  <span className="font-bold">🎲 Student Die: </span>Roll a d4 and add it to {club.skills.join(" or ")} checks made on school grounds while affiliated with the {club.name}.
                </div>
              )}
            </div>
          );

          /* ── PHASE 5: STAT MATRIX ── */
          case 5: {
            const available = getAvailableValues();
            const hints = getStatHints();
            return (
              <div className="space-y-4">
                <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                  "The Attribute Matrix records your core aptitudes. Assign the Standard Academic Array below — click a value, then click a stat to place it. Click an assigned stat to reclaim its value."
                </div>
                <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-table-cells mr-2"></i>Phase 5: Attribute Matrix</h3>

                <div>
                  <p className="text-[10px] uppercase font-bold text-amber-500 mb-2 tracking-wider">Standard Array — Click to Select</p>
                  <div className="flex gap-2 flex-wrap">
                    {STANDARD_ARRAY.map((val, i) => {
                      const used = Object.values(statAssignments).filter(v => v === val).length;
                      const total = STANDARD_ARRAY.filter(v => v === val).length;
                      const isAvail = used < total;
                      if (!isAvail) return null;
                      return (
                        <button key={i} onClick={() => handleValueChip(val)}
                          className={`w-10 h-10 rounded-lg font-bold text-sm border-2 transition-all ${pendingValue === val ? "bg-amber-500 border-amber-300 text-slate-900 scale-110" : "bg-slate-800 border-slate-600 text-amber-200 hover:border-amber-500"}`}>
                          {val}
                        </button>
                      );
                    })}
                    {available.length === 0 && <p className="text-xs text-slate-400 italic">All values assigned.</p>}
                  </div>
                  {pendingValue !== null && <p className="text-xs text-amber-400 mt-1 animate-pulse">▶ Now click a stat box to assign <strong>{pendingValue}</strong></p>}
                </div>

                <div className="grid grid-cols-3 gap-2">
                  {["STR","DEX","CON","INT","WIS","CHA"].map(stat => {
                    const val = statAssignments[stat];
                    const mod = val !== null ? Math.floor((val - 10) / 2) : null;
                    const isPrimary = CLASSES[selectedClass]?.primary === stat;
                    return (
                      <button key={stat} onClick={() => handleStatBox(stat)}
                        className={`p-3 rounded-xl border-2 text-center transition-all cursor-pointer
                          ${pendingValue !== null ? "hover:border-amber-400 hover:bg-amber-500/10" : "hover:border-slate-600"}
                          ${isPrimary ? "border-amber-500/60" : "border-slate-700"}
                          ${val !== null ? "bg-slate-800" : "bg-slate-900/50"}`}>
                        <span className="text-[9px] font-bold text-slate-400 uppercase block">{stat}{isPrimary ? " ★" : ""}</span>
                        {val !== null ? (
                          <>
                            <span className="text-xl font-extrabold text-amber-300 block">{mod >= 0 ? `+${mod}` : mod}</span>
                            <span className="text-xs text-slate-400">{val}</span>
                          </>
                        ) : (
                          <span className="text-xl text-slate-600 block">—</span>
                        )}
                      </button>
                    );
                  })}
                </div>

                {hints.length > 0 && (
                  <div className="space-y-1.5">
                    <p className="text-[10px] uppercase font-bold text-amber-500 tracking-wider">Proctor Analysis</p>
                    {hints.map((h, i) => (
                      <div key={i} className={`p-2 rounded-lg text-xs ${h.type === "warning" ? "bg-red-950/40 border border-red-500/30 text-red-200" : h.type === "star" ? "bg-amber-950/40 border border-amber-500/30 text-amber-200" : "bg-teal-950/40 border border-teal-500/30 text-teal-200"}`}>
                        {h.text}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          }

          /* ── PHASE 6: TOOLS ── */
          case 6: return (
            <div className="space-y-4">
              <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                "Every practitioner requires a physical conduit or specialized tool to channel their craft. For arcane spellcasters, this is their focus. For performers, their instrument. Select your primary implement below."
              </div>
              <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-wrench mr-2"></i>Phase 6: Specialized Tool & Instrument</h3>
              <div className="bg-slate-900/60 p-3 rounded-xl border border-slate-700">
                <p className="text-[10px] uppercase font-bold text-amber-500 mb-2 tracking-wider">{toolData.label}</p>
                <div className="flex flex-wrap gap-2">
                  {toolData.options.map(opt => (
                    <button key={opt} onClick={() => setSelectedTool(opt)}
                      className={`px-3 py-1.5 rounded-lg text-xs border transition-all ${selectedTool === opt ? "bg-amber-500/20 border-amber-500 text-amber-200" : "bg-slate-950 border-slate-700 text-slate-400 hover:border-amber-500/40"}`}>
                      {opt}
                    </button>
                  ))}
                </div>
              </div>
              {selectedTool && (
                <div className="bg-amber-950/30 border border-amber-500/30 rounded-xl p-3 text-xs text-amber-200">
                  <span className="font-bold text-amber-400">✓ Selected: </span>{selectedTool}
                  {(selectedClass === "Bard") && <p className="mt-1 text-slate-300">This instrument functions as your Spellcasting Focus and is noted on your equipment manifest.</p>}
                  {(["Wizard","Sorcerer","Warlock"].includes(selectedClass)) && <p className="mt-1 text-slate-300">This arcane focus can substitute for any material component without a listed cost.</p>}
                </div>
              )}
            </div>
          );

          /* ── PHASE 7: EQUIPMENT ── */
          case 7: return (
            <div className="space-y-4">
              <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                "All enrolled students receive a standard college package. Additionally, the bursar's office provides a one-time stipend kit based on your declared academic focus."
              </div>
              <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-briefcase mr-2"></i>Phase 7: Equipment Manifest</h3>

              <div>
                <p className="text-[10px] uppercase font-bold text-amber-500 mb-2 tracking-wider">Standard College Package (All Students)</p>
                <div className="bg-slate-900/60 p-3 rounded-xl border border-slate-700 text-xs text-slate-300 space-y-1">
                  <p>• School Uniform + {college.name || selectedCollege} Crest</p>
                  <p>• Writing Supplies (Quill & Ink)</p>
                  <p>• <span className="text-amber-300">{college.primer || "College Primer"}</span> (3 charges: +1d4 to college skill checks)</p>
                  <p>• 10 Gold Pieces</p>
                  <p>• Cuddly Strixhaven Mascot (1/day: auto-succeed on Frightened save)</p>
                </div>
              </div>

              <div>
                <p className="text-[10px] uppercase font-bold text-amber-500 mb-2 tracking-wider">Stipend Kit Selection</p>
                {Object.keys(STIPEND_KITS).map(key => (
                  <button key={key} onClick={() => setSelectedStipend(key)}
                    className={`w-full p-3 rounded-xl border text-left mb-2 transition-all ${selectedStipend === key ? "bg-amber-500/10 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 hover:border-amber-500/40"}`}>
                    <p className="font-bold text-xs">{STIPEND_KITS[key].name}</p>
                    <p className="text-[10px] text-slate-400 mt-0.5">{STIPEND_KITS[key].contents}</p>
                  </button>
                ))}
              </div>

              <div>
                <p className="text-[10px] uppercase font-bold text-amber-500 mb-2 tracking-wider">Starting Weapon</p>
                <div className="flex flex-wrap gap-2">
                  {(cls.weapons || []).map(wep => (
                    <button key={wep} onClick={() => setSelectedWeapon(wep)}
                      className={`px-3 py-1.5 rounded-lg text-xs border transition-all ${selectedWeapon === wep ? "bg-amber-500/20 border-amber-500 text-amber-200" : "bg-slate-950 border-slate-700 text-slate-400 hover:border-amber-500/40"}`}>
                      {wep}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          );

          /* ── PHASE 8: SPELLS ── */
          case 8: return (
            <div className="space-y-4">
              <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                "The Resonance Test will calibrate your spellbook to your magical signature. First, declare your primary combat philosophy. Then select up to 3 spells from the curated list."
              </div>
              <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-wand-magic-sparkles mr-2"></i>Phase 8: Arcane Tuning</h3>

              <div>
                <p className="text-[10px] uppercase font-bold text-amber-500 mb-2 tracking-wider">Resonance Test — Select Your Combat Philosophy</p>
                <div className="grid grid-cols-3 gap-2">
                  {["Destruction","Control","Harmony"].map(res => (
                    <button key={res} onClick={() => { setResonanceType(res); setSelectedSpells([]); }}
                      className={`p-3 rounded-xl border text-center text-xs font-bold transition-all ${resonanceType === res ? "bg-amber-500/20 border-amber-500 text-amber-200" : "bg-slate-900 border-slate-800 text-slate-400 hover:border-amber-500/40"}`}>
                      <div className="text-lg mb-1">{res === "Destruction" ? "💥" : res === "Control" ? "⚙️" : "✨"}</div>
                      {res}
                      <p className="text-[9px] font-normal text-slate-500 mt-0.5">{res === "Destruction" ? "Damage & Offense" : res === "Control" ? "Debuff & Zone" : "Support & Utility"}</p>
                    </button>
                  ))}
                </div>
              </div>

              {resonanceType && (
                <>
                  {getProctorSpellHint(resonanceType) && (
                    <div className="bg-amber-950/30 border border-amber-500/30 rounded-xl p-3 text-xs text-amber-200">
                      <span className="font-bold text-amber-400">📋 Proctor Guidance: </span>{getProctorSpellHint(resonanceType)}
                    </div>
                  )}
                  <div>
                    <p className="text-[10px] uppercase font-bold text-amber-500 mb-2 tracking-wider">
                      Curated {resonanceType} Spells ({selectedSpells.length}/3 selected)
                    </p>
                    <div className="grid grid-cols-1 gap-1.5">
                      {getSpellsForClass(resonanceType).map(spell => {
                        const isSel = selectedSpells.includes(spell.name);
                        return (
                          <button key={spell.name} onClick={() => isSel
                            ? setSelectedSpells(selectedSpells.filter(s => s !== spell.name))
                            : selectedSpells.length < 3 && setSelectedSpells([...selectedSpells, spell.name])}
                            className={`p-2.5 rounded-xl border text-left transition-all ${isSel ? "bg-amber-500/20 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 text-slate-400 hover:border-amber-500/40"} ${!isSel && selectedSpells.length >= 3 ? "opacity-40 cursor-not-allowed" : ""}`}>
                            <div className="flex items-center justify-between">
                              <span className="font-bold text-xs">{spell.name}</span>
                              <span className="text-[9px] text-slate-500">{spell.level}</span>
                            </div>
                            <p className="text-[10px] text-slate-400 mt-0.5">{spell.desc}</p>
                          </button>
                        );
                      })}
                      {getSpellsForClass(resonanceType).length === 0 && (
                        <p className="text-xs text-slate-500 italic p-2">No {resonanceType} spells available for {selectedClass}. The Proctor suggests selecting from your college's provided spells: {college.spells?.join(", ")}.</p>
                      )}
                    </div>
                  </div>
                </>
              )}
            </div>
          );

          /* ── PHASE 9: SKILLS ── */
          case 9: {
            const grouped = {};
            tierOrder.forEach(t => grouped[t] = []);
            SKILL_LIST.forEach(sk => {
              const tier = allAssigned() ? getSkillTier(sk) : "neutral";
              grouped[tier].push(sk);
            });
            const collegeSkills = new Set(college.skills || []);
            const max = (CLASSES[selectedClass]?.primary === "CHA" || selectedClass === "Bard") ? 4 : 3;
            return (
              <div className="space-y-4">
                <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                  {`Select ${max} additional skills from the Academic Aptitude register. Skills are ranked by your current attribute modifiers. Choose wisely — the ⚠️ flagged skills carry a statistical penalty.`}
                </div>
                <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-square-check mr-2"></i>Phase 9: Academic Aptitude ({selectedSkills.length}/{max})</h3>
                {tierOrder.filter(t => grouped[t].length > 0).map(tier => (
                  <div key={tier}>
                    <p className="text-[10px] uppercase font-bold text-slate-500 mb-1.5 tracking-wider">{tierLabel[tier]}</p>
                    <div className="grid grid-cols-3 gap-1.5">
                      {grouped[tier].map(skill => {
                        const isSel = selectedSkills.includes(skill.name);
                        const isCollege = collegeSkills.has(skill.name);
                        return (
                          <button key={skill.name} onClick={() => isSel
                            ? setSelectedSkills(selectedSkills.filter(s => s !== skill.name))
                            : selectedSkills.length < max && setSelectedSkills([...selectedSkills, skill.name])}
                            className={`p-2 rounded-lg border text-xs text-left transition-all
                              ${isSel ? "bg-amber-500/20 border-amber-500 text-amber-200" : tier === "risk" ? "bg-red-950/20 border-red-900/40 text-red-300 hover:border-red-500/60" : tier === "star" ? "bg-amber-950/20 border-amber-900/30 text-amber-300 hover:border-amber-500/40" : "bg-slate-900 border-slate-800 text-slate-400 hover:border-amber-500/30"}
                              ${!isSel && selectedSkills.length >= max ? "opacity-40 cursor-not-allowed" : ""}`}>
                            <span className="block font-semibold">{skill.name}</span>
                            <span className="text-[9px] opacity-70">{skill.stat}{isCollege ? " ★" : ""}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
                {!allAssigned() && <p className="text-xs text-slate-500 italic">Complete the Attribute Matrix (Phase 5) to see skill tier rankings.</p>}
              </div>
            );
          }

          /* ── PHASE 10: DISPOSITION ── */
          case 10: {
            const alignKeys = Object.keys(ALIGNMENTS);
            const curAlign = ALIGNMENTS[alignment];
            return (
              <div className="space-y-4">
                <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                  "The Disposition Evaluation assesses your moral and ethical orientation within campus society. This determines how you approach conflicts between personal ethics, academic rules, and community welfare."
                </div>
                <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-shield-halved mr-2"></i>Phase 10: Disposition & Ethics</h3>

                <div>
                  <p className="text-[10px] uppercase font-bold text-amber-500 mb-2 tracking-wider">Campus Alignment Grid</p>
                  <div className="grid grid-cols-3 gap-1.5">
                    {alignKeys.map(key => (
                      <button key={key} onClick={() => setAlignment(key)}
                        className={`p-2 rounded-lg border text-center text-xs transition-all ${alignment === key ? "bg-amber-500/20 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 text-slate-400 hover:border-amber-500/40"}`}>
                        <p className="font-bold text-[10px]">{ALIGNMENTS[key].archetype}</p>
                        <p className="text-[9px] text-slate-500 mt-0.5">{key}</p>
                      </button>
                    ))}
                  </div>
                </div>

                {curAlign && (
                  <div className="bg-slate-900/60 p-3 rounded-xl border border-slate-700 text-xs text-slate-300">
                    <p className="font-bold text-amber-400 mb-1">{curAlign.archetype}</p>
                    <p className="italic">{curAlign.description}</p>
                  </div>
                )}

                <div>
                  <p className="text-[10px] uppercase font-bold text-amber-500 mb-1.5 tracking-wider">Personality Trait</p>
                  <div className="space-y-1">
                    {PERSONALITY_TRAITS.map(t => (
                      <button key={t} onClick={() => setSelectedTrait(t)}
                        className={`w-full text-left p-2 rounded-lg border text-xs transition-all ${selectedTrait === t ? "bg-amber-500/10 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 text-slate-400 hover:border-amber-500/30"}`}>
                        {t}
                      </button>
                    ))}
                  </div>
                </div>

                <div>
                  <p className="text-[10px] uppercase font-bold text-amber-500 mb-1.5 tracking-wider">Ideal</p>
                  <div className="space-y-1">
                    {IDEALS.map(t => (
                      <button key={t} onClick={() => setSelectedIdeal(t)}
                        className={`w-full text-left p-2 rounded-lg border text-xs transition-all ${selectedIdeal === t ? "bg-amber-500/10 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 text-slate-400 hover:border-amber-500/30"}`}>
                        {t}
                      </button>
                    ))}
                  </div>
                </div>

                <div>
                  <p className="text-[10px] uppercase font-bold text-amber-500 mb-1.5 tracking-wider">Bond</p>
                  <div className="space-y-1">
                    {BONDS.map(t => (
                      <button key={t} onClick={() => setSelectedBond(t)}
                        className={`w-full text-left p-2 rounded-lg border text-xs transition-all ${selectedBond === t ? "bg-amber-500/10 border-amber-500 text-amber-100" : "bg-slate-900 border-slate-800 text-slate-400 hover:border-amber-500/30"}`}>
                        {t}
                      </button>
                    ))}
                  </div>
                </div>

                <div>
                  <p className="text-[10px] uppercase font-bold text-red-400 mb-1.5 tracking-wider">
                    ⚠️ Flaw — Statistical Link
                    {getLowestStat() && <span className="text-slate-500 font-normal"> (Linked to low {getLowestStat()})</span>}
                  </p>
                  <textarea value={flaw} onChange={e => setFlaw(e.target.value)}
                    className="w-full bg-slate-950 border border-red-900/40 rounded-lg px-3 py-2 text-xs text-red-200 h-16 resize-none" />
                  <div className="grid grid-cols-2 gap-1 mt-1">
                    {Object.keys(FLAWS_BY_STAT).map(st => (
                      <button key={st} onClick={() => setFlaw(FLAWS_BY_STAT[st])}
                        className="text-left text-[9px] px-2 py-1 rounded bg-slate-900 border border-slate-800 text-slate-500 hover:text-red-300 hover:border-red-800 transition-all">
                        {STAT_LABELS[st]} flaw
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          /* ── PHASE 11: ENROLLMENT ── */
          case 11: {
            const lineageNames = NAME_BUCKETS.lineage[selectedLineage] || NAME_BUCKETS.lineage.default;
            const collegeNames = NAME_BUCKETS.college[selectedCollege] || NAME_BUCKETS.college.default;
            const low = getLowestStat();
            const ironicNames = low ? (NAME_BUCKETS.ironic[low] || NAME_BUCKETS.ironic.default) : NAME_BUCKETS.ironic.default;
            return (
              <div className="space-y-4">
                <div className="bg-slate-800/60 p-3 rounded-xl border border-amber-500/20 text-xs text-amber-200/80 italic">
                  "All that remains is the official enrollment signature. Please inscribe your name on the university register. This document is legally binding within all five planes recognized by the Strixhaven Academic Senate."
                </div>
                <h3 className="text-amber-400 font-bold text-lg"><i className="fa-solid fa-file-signature mr-2"></i>Phase 11: Enrollment Signature</h3>
                <div className="space-y-3">
                  <div>
                    <label className="text-[10px] uppercase font-bold text-amber-500 tracking-wider block mb-1">Character Name</label>
                    <input type="text" value={characterName} onChange={e => setCharacterName(e.target.value)}
                      placeholder="Enter your character's name..." className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 focus:border-amber-500 outline-none" />
                  </div>
                  <div>
                    <label className="text-[10px] uppercase font-bold text-amber-500 tracking-wider block mb-1">Player Name</label>
                    <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)}
                      placeholder="Your real name..." className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 focus:border-amber-500 outline-none" />
                  </div>
                  <div>
                    <label className="text-[10px] uppercase font-bold text-amber-500 tracking-wider block mb-1">Backstory Draft</label>
                    <textarea value={backstory} onChange={e => setBackstory(e.target.value)}
                      placeholder="Where did you come from? What brought you to Strixhaven? What do you hope to achieve?"
                      className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 h-24 resize-none focus:border-amber-500 outline-none" />
                  </div>
                </div>
                <button onClick={() => setShowNameBuckets(!showNameBuckets)}
                  className="w-full py-2 bg-slate-800 border border-amber-500/30 text-amber-400 rounded-lg text-xs font-semibold hover:bg-amber-500/10 transition-all">
                  <i className="fa-solid fa-lightbulb mr-2"></i>{showNameBuckets ? "Hide" : "Need a Name? — Generate Ideas"}
                </button>
                {showNameBuckets && (
                  <div className="space-y-3">
                    {[
                      { label: NAME_BUCKETS.lineage.label, names: lineageNames },
                      { label: NAME_BUCKETS.college.label, names: collegeNames },
                      { label: NAME_BUCKETS.ironic.label,  names: ironicNames }
                    ].map(bucket => (
                      <div key={bucket.label}>
                        <p className="text-[10px] font-bold text-amber-500 mb-1.5">{bucket.label}</p>
                        <div className="flex flex-wrap gap-1.5">
                          {bucket.names.map(name => (
                            <button key={name} onClick={() => setCharacterName(name)}
                              className="px-2.5 py-1 bg-slate-900 border border-slate-700 text-slate-300 rounded-lg text-xs hover:border-amber-500 hover:text-amber-300 transition-all">
                              {name}
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          }

          default: return null;
        }
      };

      // ─── CHARACTER SHEET ───────────────────────────────────────────────────────

      const college = COLLEGES[selectedCollege] || {};
      const cls     = CLASSES[selectedClass]    || {};

      const renderSheet = () => {
        switch (activeSheetTab) {
          case 1: return (
            <div className="space-y-4">
              <div className="border-b-2 border-[#2c2214] pb-3">
                <span className="text-[9px] uppercase text-[#66543b] font-bold tracking-wider">Character Name</span>
                <h2 className="text-lg font-bold font-serif">{characterName || "Unnamed Student"}</h2>
                <p className="text-xs text-[#66543b] mt-0.5">{cls.name || "—"} 1 · {selectedCollege} · {selectedLineage}{selectedSize !== "Medium" ? ` (${selectedSize})` : ""} · {alignment}</p>
              </div>
              <div className="grid grid-cols-3 gap-2">
                {["STR","DEX","CON","INT","WIS","CHA"].map(stat => {
                  const isPrimary = cls.primary === stat;
                  const score = statAssignments[stat];
                  const mod = score !== null ? Math.floor((score - 10) / 2) : null;
                  return (
                    <div key={stat} className={`border-2 rounded-xl p-2 bg-[#f9f5eb] text-center shadow-sm ${isPrimary ? "border-amber-600" : "border-[#2c2214]"}`}>
                      <span className="text-[8px] font-bold text-slate-500 uppercase">{stat}{isPrimary ? " ★" : ""}</span>
                      <span className="text-sm font-extrabold block text-amber-900">{mod !== null ? (mod >= 0 ? `+${mod}` : mod) : "—"}</span>
                      <span className="text-[10px] font-mono">{score ?? "—"}</span>
                    </div>
                  );
                })}
              </div>
              <div className="grid grid-cols-3 gap-2">
                <div className="border border-[#2c2214]/30 rounded-lg p-2 bg-[#f9f5eb] text-center text-xs font-bold"><span className="text-[8px] block text-slate-500 uppercase">AC</span>{allAssigned() ? getAC() : "—"}</div>
                <div className="border border-[#2c2214]/30 rounded-lg p-2 bg-[#f9f5eb] text-center text-xs font-bold"><span className="text-[8px] block text-slate-500 uppercase">Initiative</span>{allAssigned() ? getModStr("DEX") : "—"}</div>
                <div className="border border-[#2c2214]/30 rounded-lg p-2 bg-[#f9f5eb] text-center text-xs font-bold text-emerald-900"><span className="text-[8px] block text-slate-500 uppercase">Max HP</span>{allAssigned() ? getMaxHP() : "—"}</div>
              </div>
              <div className="grid grid-cols-2 gap-2 text-xs">
                <div className="border border-[#2c2214]/20 rounded-lg p-2 bg-[#f9f5eb]"><span className="text-[8px] uppercase text-slate-500 block">Speed</span>{(LINEAGES[selectedLineage]?.speed || 30)} ft.</div>
                <div className="border border-[#2c2214]/20 rounded-lg p-2 bg-[#f9f5eb]"><span className="text-[8px] uppercase text-slate-500 block">Darkvision</span>{(LINEAGES[selectedLineage]?.darkvision || 0) > 0 ? `${LINEAGES[selectedLineage].darkvision} ft.` : "None"}</div>
              </div>
              {selectedSkills.length > 0 && (
                <div>
                  <span className="text-[9px] uppercase font-bold text-[#66543b] tracking-wider block mb-1">Proficient Skills</span>
                  <div className="flex flex-wrap gap-1">
                    {selectedSkills.map(s => <span key={s} className="text-[10px] bg-amber-100 text-amber-900 px-2 py-0.5 rounded-full border border-amber-300">{s}</span>)}
                    {(college.skills || []).map(s => !selectedSkills.includes(s) && <span key={s} className="text-[10px] bg-blue-100 text-blue-900 px-2 py-0.5 rounded-full border border-blue-300">{s} ★</span>)}
                  </div>
                </div>
              )}
              {selectedWeapon && (
                <div className="border border-[#2c2214]/20 rounded-lg p-2 bg-[#f9f5eb] text-xs">
                  <span className="text-[8px] uppercase text-slate-500 block">Starting Weapon</span>
                  {selectedWeapon}{selectedTool ? ` · ${selectedTool}` : ""}
                </div>
              )}
            </div>
          );

          case 2: return (
            <div className="space-y-3">
              <h3 className="text-sm font-bold font-serif text-amber-900 border-b border-[#2c2214] pb-1">Backstory & Persona</h3>
              <div className="bg-[#faf7f0] p-3 rounded-xl border border-[#2c2214]/20 text-xs leading-relaxed font-serif min-h-[100px]">
                {backstory || <span className="text-slate-400 italic">No backstory recorded.</span>}
              </div>
              {selectedTrait && <div className="text-xs"><span className="text-[9px] uppercase font-bold text-[#66543b] block mb-0.5">Personality Trait</span><p className="italic">{selectedTrait}</p></div>}
              {selectedIdeal && <div className="text-xs"><span className="text-[9px] uppercase font-bold text-[#66543b] block mb-0.5">Ideal</span><p className="italic">{selectedIdeal}</p></div>}
              {selectedBond  && <div className="text-xs"><span className="text-[9px] uppercase font-bold text-[#66543b] block mb-0.5">Bond</span><p className="italic">{selectedBond}</p></div>}
              {flaw          && <div className="text-xs"><span className="text-[9px] uppercase font-bold text-red-700 block mb-0.5">Flaw</span><p className="italic text-red-800">{flaw}</p></div>}
              <div className="text-xs"><span className="text-[9px] uppercase font-bold text-[#66543b] block mb-0.5">Alignment</span><p>{alignment} — {ALIGNMENTS[alignment]?.archetype || ""}</p></div>
            </div>
          );

          case 3: return (
            <div className="space-y-3">
              <div className="flex justify-between items-end border-b border-[#2c2214] pb-1">
                <h3 className="text-sm font-bold font-serif text-amber-900">Spellbook</h3>
                <div className="text-right text-xs">
                  <div><span className="text-[8px] uppercase text-slate-500">Save DC</span> <span className="font-bold">{allAssigned() ? getSpellSaveDC() : "—"}</span></div>
                  <div><span className="text-[8px] uppercase text-slate-500">Atk Bonus</span> <span className="font-bold">{allAssigned() ? getSpellAtk() : "—"}</span></div>
                  <div><span className="text-[8px] uppercase text-slate-500">Ability</span> <span className="font-bold">{STAT_LABELS[getSpellAbility()]}</span></div>
                </div>
              </div>
              {college.spells?.length > 0 && (
                <div>
                  <span className="text-[9px] uppercase font-bold text-[#66543b] block mb-1">College Spells ({college.name})</span>
                  {college.spells.map(s => <div key={s} className="bg-blue-50 border border-blue-200 p-1.5 rounded mb-1 text-xs font-semibold text-blue-900">{s}</div>)}
                </div>
              )}
              {selectedSpells.length > 0 && (
                <div>
                  <span className="text-[9px] uppercase font-bold text-[#66543b] block mb-1">Selected Spells</span>
                  {selectedSpells.map(s => <div key={s} className="bg-white/80 p-1.5 rounded border border-[#2c2214]/10 mb-1 text-xs font-semibold">{s}</div>)}
                </div>
              )}
              {selectedSpells.length === 0 && college.spells?.length === 0 && <p className="text-xs text-slate-400 italic">No spells recorded yet.</p>}
            </div>
          );

          case 4: return (
            <div className="space-y-3">
              <h3 className="text-sm font-bold font-serif text-amber-900 border-b border-[#2c2214] pb-1">Strixhaven Campus File</h3>
              <div className="bg-[#faf7f0] border border-[#2c2214]/20 p-3 rounded-lg text-xs space-y-1">
                <p className="font-bold text-amber-950">{college.name || "—"} College</p>
                <p className="text-slate-600">Primer: {college.primer || "—"}</p>
                <p className="text-slate-600">Feat: {college.feat || "—"}</p>
              </div>
              <div className="bg-[#faf7f0] border border-[#2c2214]/20 p-3 rounded-lg text-xs">
                <p className="font-bold text-amber-950">{CLUBS[selectedClub]?.name || "No club selected"}</p>
                <p className="text-slate-600 mt-0.5">Contact: {CLUBS[selectedClub]?.npc || "—"}</p>
                <span className="text-[10px] bg-amber-900 text-white px-2 py-0.5 rounded-full mt-1.5 inline-block">Student Die d4</span>
              </div>
              <div className="bg-[#faf7f0] border border-[#2c2214]/20 p-3 rounded-lg text-xs">
                <p className="font-bold text-amber-950">Job: {customJobs.employer}</p>
                <p className="text-slate-600">Stipend Kit: {STIPEND_KITS[selectedStipend]?.name || "—"}</p>
              </div>
              <div>
                <span className="text-[9px] uppercase font-bold text-slate-500 block mb-1">NPC Relationships</span>
                {npcRelationships.map((npc, i) => (
                  <p key={i} className="text-xs bg-white p-2 rounded border border-[#2c2214]/10 mb-1">{npc.name} — {npc.relationship} ({npc.points} pts)</p>
                ))}
              </div>
            </div>
          );

          default: return null;
        }
      };

      // ─── RENDER ────────────────────────────────────────────────────────────────

      return (
        <div className="flex flex-col lg:flex-row h-screen">

          {/* LEFT: EXAM PANEL */}
          <section className="w-full lg:w-1/2 p-4 md:p-6 border-r border-slate-800 flex flex-col justify-between bg-slate-900/40 overflow-y-auto">
            <div>
              <header className="mb-5 border-b border-amber-500/30 pb-4">
                <h1 className="text-xl font-bold tracking-wider text-amber-400 font-serif">
                  <i className="fa-solid fa-wand-magic-sparkles mr-2 text-amber-500"></i>STRIXHAVEN UNIVERSITY
                </h1>
                <p className="text-xs text-slate-400 tracking-widest uppercase mt-0.5">Entrance Assessment — Phase {phase} of 11</p>
                <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mt-2">
                  <div className="bg-gradient-to-r from-amber-600 to-amber-400 h-full transition-all duration-500"
                    style={{ width: `${(phase / 11) * 100}%` }}></div>
                </div>
                <div className="flex mt-2 gap-0.5">
                  {Array.from({length: 11}, (_, i) => (
                    <button key={i} onClick={() => setPhase(i + 1)}
                      className={`flex-1 h-1 rounded-full transition-all ${i + 1 <= phase ? "bg-amber-500" : "bg-slate-700"}`} />
                  ))}
                </div>
              </header>
              {renderPhase()}
            </div>

            <div className="mt-6 border-t border-slate-800/80 pt-4 flex justify-between items-center">
              <button onClick={handlePrev} disabled={phase === 1}
                className="px-4 py-2 bg-slate-900 border border-slate-800 text-slate-300 disabled:opacity-40 rounded-lg text-xs font-semibold hover:border-amber-500/40 transition-all">
                ← Previous
              </button>

              <button onClick={seedDatabase}
                className="px-3 py-2 bg-purple-950/60 hover:bg-purple-900/60 border border-purple-800/40 text-purple-400 rounded-lg text-xs font-semibold transition-all">
                <i className="fa-solid fa-database mr-1"></i> Seed DB
              </button>

              {phase < 11 ? (
                <button onClick={handleNext}
                  className="px-5 py-2 bg-amber-600 hover:bg-amber-500 text-white rounded-lg text-xs font-semibold shadow transition-all">
                  Next Phase →
                </button>
              ) : (
                <button onClick={submitToFirebase} disabled={isSaving}
                  className="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white rounded-lg text-xs font-semibold shadow-lg transition-all">
                  <i className="fa-solid fa-cloud-arrow-up mr-2"></i>{isSaving ? "Syncing…" : "Submit File"}
                </button>
              )}
            </div>
          </section>

          {/* RIGHT: CHARACTER SHEET */}
          <section className="w-full lg:w-1/2 p-4 md:p-6 bg-slate-800/30 flex flex-col gap-3 overflow-y-auto">
            <div className="flex gap-2 border-b border-slate-800 pb-3">
              {[
                { id: 1, label: "Core Stats" },
                { id: 2, label: "Backstory" },
                { id: 3, label: "Spellbook" },
                { id: 4, label: "Campus" }
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveSheetTab(tab.id)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${activeSheetTab === tab.id ? "bg-amber-500 text-slate-950" : "bg-slate-950 text-slate-400 border border-slate-800 hover:border-amber-500/40"}`}>
                  {tab.label}
                </button>
              ))}
            </div>

            <div className="flex-1 bg-[#fdfaf2] text-[#2c2214] p-5 rounded-2xl border-4 border-[#ded1ba] overflow-y-auto shadow-inner">
              {renderSheet()}
            </div>

            {playerName && (
              <div className="text-center text-[10px] text-slate-600 font-mono tracking-wider">
                Student UID: {window.studentUid || "LOCAL SESSION"} · Player: {playerName}
              </div>
            )}
          </section>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
</html>
