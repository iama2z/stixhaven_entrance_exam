  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNpbiRhVCXSRov1Uv4bkEAH7MVvdGTZio",
      authDomain: "strixhaven-entrance-exam.firebaseapp.com",
      projectId: "strixhaven-entrance-exam",
      storageBucket: "strixhaven-entrance-exam.firebasestorage.app",
      messagingSenderId: "8332021790",
      appId: "1:8332021790:web:f704df9cc7f6d897de1e0f",
      measurementId: "G-87PT8HMF3V"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const functions = getFunctions(app);

    window.firebaseDb = db;
    window.firebaseAuth = auth;
    window.firestoreDoc = doc;
    window.firestoreSetDoc = setDoc;
    window.firestoreGetDoc = getDoc; 

    const askStrixhavenConsultant = httpsCallable(functions, 'strixhavenConsultant');
    window.askAdmissionsAI = async (chatHistory, latestMessage, gameData) => {
        const result = await askStrixhavenConsultant({ 
            chatHistory,
            latestMessage,
            gameData
        });
        return result.data;
    };

    async function initializeSession() {
      try {
        await signInAnonymously(auth);
        console.log("Connected to Strixhaven Mainframe.");
      } catch (error) {
        console.warn("Firebase Auth blocked. Local mode only.", error.message);
      }
    }
    initializeSession();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STANDARD_ARRAY = [15, 14, 13, 12, 10, 8];
    const STAT_LABELS = { STR: "Strength", DEX: "Dexterity", CON: "Constitution", INT: "Intelligence", WIS: "Wisdom", CHA: "Charisma" };

    const COLLEGES = {
      Prismari:    { name: "Prismari",    spellcastingAbility: "CHA" },
      Silverquill: { name: "Silverquill", spellcastingAbility: "CHA" },
      Quandrix:    { name: "Quandrix",    spellcastingAbility: "INT" },
      Witherbloom: { name: "Witherbloom", spellcastingAbility: "WIS" },
      Lorehold:    { name: "Lorehold",    spellcastingAbility: "INT" }
    };

    const LINEAGES = {
      Owlin:    { name: "Owlin",    sizeOptions: ["Small", "Medium"], speed: 30 },
      Human:    { name: "Human",    sizeOptions: ["Medium"],          speed: 30 },
      Elf:      { name: "Elf",      sizeOptions: ["Medium"],          speed: 30 },
      Dwarf:    { name: "Dwarf",    sizeOptions: ["Medium"],          speed: 25 },
      Tiefling: { name: "Tiefling", sizeOptions: ["Small", "Medium"], speed: 30 },
      Gnome:    { name: "Gnome",    sizeOptions: ["Small"],           speed: 30 },
      Halfling: { name: "Halfling", sizeOptions: ["Small"],           speed: 30 },
      Aasimar:  { name: "Aasimar",  sizeOptions: ["Small", "Medium"], speed: 30 },
      Orc:      { name: "Orc",      sizeOptions: ["Medium"],          speed: 30 }
    };

    const CLASSES = {
      Bard:      { name: "Bard",      hitDie: 8,  primary: "CHA" },
      Cleric:    { name: "Cleric",    hitDie: 8,  primary: "WIS" },
      Druid:     { name: "Druid",     hitDie: 8,  primary: "WIS" },
      Fighter:   { name: "Fighter",   hitDie: 10, primary: "STR" },
      Monk:      { name: "Monk",      hitDie: 8,  primary: "DEX" },
      Paladin:   { name: "Paladin",   hitDie: 10, primary: "STR" },
      Ranger:    { name: "Ranger",    hitDie: 10, primary: "DEX" },
      Rogue:     { name: "Rogue",     hitDie: 8,  primary: "DEX" },
      Sorcerer:  { name: "Sorcerer",  hitDie: 6,  primary: "CHA" },
      Warlock:   { name: "Warlock",   hitDie: 8,  primary: "CHA" },
      Wizard:    { name: "Wizard",    hitDie: 6,  primary: "INT" },
      Barbarian: { name: "Barbarian", hitDie: 12, primary: "STR" }
    };

    const SPELL_CAPACITY = {
      Bard:      { cantrips: 2, spells: 4 },
      Cleric:    { cantrips: 3, spells: 4 }, 
      Druid:     { cantrips: 2, spells: 4 }, 
      Fighter:   { cantrips: 0, spells: 0 },
      Monk:      { cantrips: 0, spells: 0 },
      Paladin:   { cantrips: 0, spells: 0 },
      Ranger:    { cantrips: 0, spells: 0 },
      Rogue:     { cantrips: 0, spells: 0 },
      Sorcerer:  { cantrips: 4, spells: 2 },
      Warlock:   { cantrips: 2, spells: 2 },
      Wizard:    { cantrips: 3, spells: 6 }, 
      Barbarian: { cantrips: 0, spells: 0 }
    };

    const CLUBS = {
      "Fine Artists":       { name: "Distinguished Society of Fine Artists" },
      "LARP Guild":         { name: "LARP Guild" },
      "Strixhaven Star":    { name: "Strixhaven Star Newspaper" },
      "Drama Society":      { name: "Campus Drama Society" },
      "Silkball Club":      { name: "Intramural Silkball Club" }
    };

    const STIPEND_KITS = {
      "Star Performer":      { name: "Star Performer Kit" },
      "Stealthy Archivist":  { name: "Stealthy Archivist Kit" },
      "Practical Survivalist":{ name: "Practical Survivalist Kit" }
    };

    const SPELLS_BY_RESONANCE = {
      Destruction: [
        { name: "Fire Bolt",       level: "Cantrip",   classes: ["Sorcerer","Wizard","Prismari"] },
        { name: "Ray of Frost",    level: "Cantrip",   classes: ["Sorcerer","Wizard"] },
        { name: "Vicious Mockery", level: "Cantrip",   classes: ["Bard","Silverquill"] },
        { name: "Eldritch Blast",  level: "Cantrip",   classes: ["Warlock"] },
        { name: "Sacred Flame",    level: "Cantrip",   classes: ["Cleric","Lorehold","Silverquill"] },
        { name: "Magic Missile",   level: "1st-level", classes: ["Sorcerer","Wizard"] },
        { name: "Burning Hands",   level: "1st-level", classes: ["Sorcerer","Wizard"] },
        { name: "Chromatic Orb",   level: "1st-level", classes: ["Sorcerer","Wizard"] },
        { name: "Guiding Bolt",    level: "1st-level", classes: ["Cleric"] },
        { name: "Hellish Rebuke",  level: "1st-level", classes: ["Warlock"] }
      ],
      Control: [
        { name: "Minor Illusion",  level: "Cantrip",   classes: ["Bard","Sorcerer","Warlock","Wizard"] },
        { name: "Blade Ward",      level: "Cantrip",   classes: ["Bard","Sorcerer","Warlock","Wizard"] },
        { name: "Thunderwave",     level: "1st-level", classes: ["Bard","Druid","Sorcerer","Wizard","Prismari"] },
        { name: "Bane",            level: "1st-level", classes: ["Bard","Cleric","Warlock"] },
        { name: "Hideous Laughter",level: "1st-level", classes: ["Bard","Wizard"] },
        { name: "Faerie Fire",     level: "1st-level", classes: ["Bard","Druid"] },
        { name: "Entangle",        level: "1st-level", classes: ["Druid","Quandrix"] },
        { name: "Fog Cloud",       level: "1st-level", classes: ["Druid","Sorcerer","Wizard"] },
        { name: "Charm Person",    level: "1st-level", classes: ["Bard","Druid","Sorcerer","Warlock","Wizard"] },
        { name: "Color Spray",     level: "1st-level", classes: ["Bard","Sorcerer","Wizard"] }
      ],
      Harmony: [
        { name: "Guidance",        level: "Cantrip",   classes: ["Cleric","Druid","Quandrix","Witherbloom"] },
        { name: "Resistance",      level: "Cantrip",   classes: ["Cleric","Druid"] },
        { name: "Spare the Dying", level: "Cantrip",   classes: ["Cleric","Witherbloom"] },
        { name: "Mending",         level: "Cantrip",   classes: ["Bard","Cleric","Druid","Sorcerer","Wizard"] },
        { name: "Cure Wounds",     level: "1st-level", classes: ["Bard","Cleric","Druid","Paladin","Ranger","Prismari","Witherbloom"] },
        { name: "Healing Word",    level: "1st-level", classes: ["Bard","Cleric","Druid"] },
        { name: "Bless",           level: "1st-level", classes: ["Cleric","Paladin"] },
        { name: "Heroism",         level: "1st-level", classes: ["Bard","Paladin"] },
        { name: "Shield",          level: "1st-level", classes: ["Sorcerer","Wizard","Prismari"] },
        { name: "Detect Magic",    level: "1st-level", classes: ["Bard","Cleric","Druid","Sorcerer","Wizard"] }
      ]
    };

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [loginMode, setLoginMode] = useState('new'); 
      const [portalUsername, setPortalUsername] = useState('');
      const [portalPassword, setPortalPassword] = useState('');
      const [authError, setAuthError] = useState('');
      const [isAuthLoading, setIsAuthLoading] = useState(false);

      const [phase, setPhase] = useState(1);
      const [activeSheetTab, setActiveSheetTab] = useState(1);
      const [isSaving, setIsSaving] = useState(false);
      const [chatHistory, setChatHistory] = useState([]);
      const [chatInput, setChatInput] = useState('');
      const [isChatLoading, setIsChatLoading] = useState(false);
      const chatEndRef = useRef(null);
      const hasInitialized = useRef(false);

      const [selectedLineage, setSelectedLineage] = useState("Human");
      const [selectedSize, setSelectedSize] = useState("Medium");
      const [selectedClass, setSelectedClass] = useState("Bard");
      const [selectedCollege, setSelectedCollege] = useState("Prismari");
      const [selectedClub, setSelectedClub] = useState("Fine Artists");
      const [statAssignments, setStatAssignments] = useState({ STR: null, DEX: null, CON: null, INT: null, WIS: null, CHA: null });
      const [selectedTool, setSelectedTool] = useState("");
      const [selectedStipend, setSelectedStipend] = useState("Star Performer");
      const [selectedWeapon, setSelectedWeapon] = useState("");
      const [selectedArmor, setSelectedArmor] = useState("Unarmored");
      const [selectedLanguage, setSelectedLanguage] = useState("Common");
      const [resonanceType, setResonanceType] = useState(null);
      const [selectedSpells, setSelectedSpells] = useState([]);
      const [selectedSkills, setSelectedSkills] = useState([]);
      
      const [selectedTrait, setSelectedTrait] = useState("");
      const [selectedIdeal, setSelectedIdeal] = useState("");
      const [selectedBond, setSelectedBond] = useState("");
      const [alignment, setAlignment] = useState("Neutral Good");
      const [flaw, setFlaw] = useState("");
      const [characterName, setCharacterName] = useState("");
      const [backstory, setBackstory] = useState("");

      const getScore  = (stat) => statAssignments[stat] ?? 10;
      const getMod    = (stat) => Math.floor((getScore(stat) - 10) / 2);
      const getModStr = (stat) => { const m = getMod(stat); return m >= 0 ? `+${m}` : `${m}`; };
      const getMaxHP = () => (CLASSES[selectedClass]?.hitDie || 8) + getMod("CON");
      const getSpellAbility = () => COLLEGES[selectedCollege]?.spellcastingAbility || "INT";
      const getSpellSaveDC = () => 8 + 2 + getMod(getSpellAbility());
      
      const getAC = () => {
        const dexMod = getMod("DEX");
        if (selectedArmor === "Heavy Armor") return 16; 
        if (selectedArmor === "Medium Armor") return 13 + Math.min(2, dexMod); 
        if (selectedArmor === "Light Armor") return 11 + dexMod; 
        return 10 + dexMod; 
      };

      const getGameDataForPhase = (phaseNum) => {
        return { 
          lineages: LINEAGES, 
          classes: CLASSES, 
          colleges: COLLEGES, 
          clubs: CLUBS, 
          currentClass: selectedClass 
        };
      };

      const loadStudentData = (data) => {
        if (data.phase) setPhase(data.phase);
        if (data.chatHistory) setChatHistory(data.chatHistory);
        if (data.selectedLineage) setSelectedLineage(data.selectedLineage);
        if (data.selectedSize) setSelectedSize(data.selectedSize);
        if (data.selectedClass) setSelectedClass(data.selectedClass);
        if (data.selectedCollege) setSelectedCollege(data.selectedCollege);
        if (data.selectedClub) setSelectedClub(data.selectedClub);
        if (data.statAssignments) setStatAssignments(data.statAssignments);
        if (data.selectedTool) setSelectedTool(data.selectedTool);
        if (data.selectedStipend) setSelectedStipend(data.selectedStipend);
        if (data.selectedWeapon) setSelectedWeapon(data.selectedWeapon);
        if (data.selectedArmor) setSelectedArmor(data.selectedArmor);
        if (data.selectedLanguage) setSelectedLanguage(data.selectedLanguage);
        if (data.resonanceType) setResonanceType(data.resonanceType);
        if (data.selectedSpells) setSelectedSpells(data.selectedSpells);
        if (data.selectedSkills) setSelectedSkills(data.selectedSkills);
        if (data.selectedTrait) setSelectedTrait(data.selectedTrait);
        if (data.selectedIdeal) setSelectedIdeal(data.selectedIdeal);
        if (data.selectedBond) setSelectedBond(data.selectedBond);
        if (data.alignment) setAlignment(data.alignment);
        if (data.flaw) setFlaw(data.flaw);
        if (data.characterName) setCharacterName(data.characterName);
        if (data.backstory) setBackstory(data.backstory);
      };

      const applySystemUpdates = (updates) => {
        if (!updates) return;
        if (updates.nextPhaseNumber != null) setPhase(Math.max(1, Math.min(11, updates.nextPhaseNumber)));
        if (updates.selectedLineage != null) setSelectedLineage(updates.selectedLineage);
        if (updates.selectedSize != null) setSelectedSize(updates.selectedSize);
        if (updates.selectedClass != null) setSelectedClass(updates.selectedClass);
        if (updates.selectedCollege != null) setSelectedCollege(updates.selectedCollege);
        if (updates.selectedClub != null) setSelectedClub(updates.selectedClub);
        if (updates.statAssignments != null) setStatAssignments(prev => ({ ...prev, ...updates.statAssignments }));
        if (updates.selectedTool != null) setSelectedTool(updates.selectedTool);
        if (updates.selectedStipend != null) setSelectedStipend(updates.selectedStipend);
        if (updates.selectedWeapon != null) setSelectedWeapon(updates.selectedWeapon);
        if (updates.selectedArmor != null) setSelectedArmor(updates.selectedArmor);
        if (updates.selectedLanguage != null) setSelectedLanguage(updates.selectedLanguage);
        if (updates.resonanceType != null) setResonanceType(updates.resonanceType);
        if (updates.selectedSpells != null) setSelectedSpells(updates.selectedSpells);
        if (updates.selectedSkills != null) setSelectedSkills(updates.selectedSkills);
        if (updates.selectedTrait != null) setSelectedTrait(updates.selectedTrait);
        if (updates.selectedIdeal != null) setSelectedIdeal(updates.selectedIdeal);
        if (updates.selectedBond != null) setSelectedBond(updates.selectedBond);
        if (updates.alignment != null) setAlignment(updates.alignment);
        if (updates.flaw != null) setFlaw(updates.flaw);
        if (updates.characterName != null) setCharacterName(updates.characterName);
        if (updates.backstory != null) setBackstory(updates.backstory);
      };

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatHistory, isChatLoading]);

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError('');
        
        const cleanUsername = portalUsername.trim().toLowerCase();
        if (!cleanUsername || !portalPassword.trim()) {
          setAuthError('Both Student ID and Password are required.');
          return;
        }

        setIsAuthLoading(true);
        try {
          const docRef = window.firestoreDoc(window.firebaseDb, "student_enrollments", cleanUsername);
          const docSnap = await window.firestoreGetDoc(docRef);

          if (loginMode === 'returning') {
            if (docSnap.exists() && docSnap.data().portalPassword === portalPassword) {
              loadStudentData(docSnap.data());
              setIsAuthenticated(true);
            } else {
              setAuthError('Invalid Student ID or Password.');
            }
          } else {
            if (docSnap.exists()) {
              setAuthError('This Student ID is already taken.');
            } else {
              setIsAuthenticated(true);
            }
          }
        } catch (error) {
          setAuthError('Failed to connect to Strixhaven servers.');
        }
        setIsAuthLoading(false);
      };

      useEffect(() => {
        if (!isAuthenticated || hasInitialized.current || chatHistory.length > 0) return;
        hasInitialized.current = true;
        
        const initConversation = async () => {
          setIsChatLoading(true);
          const initPrompt = "Introduce yourself as the Proctor and ask the Phase 1 question.";
          try {
            const response = await window.askAdmissionsAI([], initPrompt, getGameDataForPhase(1));
            const proctorMsg = response.proctorMessage || response.response || "Welcome to the Strixhaven Biblioplex.";
            setChatHistory([{ role: 'proctor', text: proctorMsg }]);
            if (response.systemUpdates) applySystemUpdates(response.systemUpdates);
          } catch (err) {
            setChatHistory([{ role: 'proctor', text: 'Welcome. I am your Admissions Proctor. How do you perceive your place in the multiverse? A) Physical Pioneer B) Intellectual Observer C) Social Conduit D) Resilient Survivor' }]);
          }
          setIsChatLoading(false);
        };
        initConversation();
      }, [isAuthenticated]);

      const submitToFirebase = async (silent = false) => {
        if (!window.firebaseDb) { 
          if (!silent) alert("Database disconnected."); 
          return; 
        }
        setIsSaving(true);
        try {
          const cleanUsername = portalUsername.trim().toLowerCase();
          await window.firestoreSetDoc(window.firestoreDoc(window.firebaseDb, "student_enrollments", cleanUsername), {
            portalUsername: cleanUsername,
            portalPassword: portalPassword,
            phase, chatHistory, characterName, selectedLineage, selectedSize, selectedCollege, selectedClass,
            selectedClub, selectedStipend, selectedTool, selectedWeapon, selectedArmor, selectedLanguage, alignment, statAssignments, selectedSkills, 
            selectedSpells, resonanceType, selectedTrait, selectedIdeal, selectedBond, flaw, backstory, lastUpdated: new Date().toISOString()
          }, { merge: true });
          
          if (!silent) alert("Student File successfully synced to the Strixhaven Cloud!");
        } catch (e) { 
          console.error(e); 
          if (!silent) alert("Failed to save. Check console."); 
        }
        setIsSaving(false);
      };
      
      const downloadCharacterSheet = () => {
        const content = `
=========================================
STRIXHAVEN UNIVERSITY - OFFICIAL TRANSCRIPT
=========================================
Student Name: ${characterName || "Unnamed Student"}
Lineage: ${selectedLineage} (${selectedSize})
Class: ${selectedClass}
College: ${selectedCollege}
Alignment: ${alignment}
Background: Strixhaven Student

--- DERIVED COMBAT STATS ---
Armor Class (AC): ${getAC()} (${selectedArmor})
Hit Points (HP): ${getMaxHP()} / ${getMaxHP()}
Hit Dice: 1d${CLASSES[selectedClass]?.hitDie || 8}
Initiative: ${getModStr('DEX')}
Speed: ${LINEAGES[selectedLineage]?.speed || 30} ft.
Proficiency Bonus: +2
Inspiration: 0

--- CORE ATTRIBUTES ---
STR: ${getScore('STR')} (${getModStr('STR')})
DEX: ${getScore('DEX')} (${getModStr('DEX')})
CON: ${getScore('CON')} (${getModStr('CON')})
INT: ${getScore('INT')} (${getModStr('INT')})
WIS: ${getScore('WIS')} (${getModStr('WIS')})
CHA: ${getScore('CHA')} (${getModStr('CHA')})

--- ACADEMICS & EXTRACURRICULARS ---
Club: ${CLUBS[selectedClub]?.name || "None"}
Skills: ${selectedSkills.join(", ")}
Languages: Common, ${selectedLanguage}
Tool Focus: ${selectedTool}
Equipment: ${selectedWeapon}, ${STIPEND_KITS[selectedStipend]?.name}

--- MAGIC & SPELLS ---
Spellcasting Ability: ${getSpellAbility()}
Spell Save DC: ${getSpellSaveDC()}
Known Spells: ${selectedSpells.join(", ")}

--- PSYCHOLOGICAL PROFILE ---
Trait: ${selectedTrait}
Ideal: ${selectedIdeal}
Bond: ${selectedBond}
Flaw: ${flaw}

--- OFFICIAL BACKGROUND FILE ---
${backstory}
`;
        const blob = new Blob([content.trim()], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${(characterName || "Strixhaven_Student").replace(/\s+/g, '_')}_Sheet.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleChatSubmit = async () => {
        if (!chatInput.trim() || isChatLoading) return;
        const userMsg = chatInput.trim();
        setChatInput('');
        const newHistory = [...chatHistory, { role: 'user', text: userMsg }];
        setChatHistory(newHistory);
        setIsChatLoading(true);

        submitToFirebase(true);

        try {
          const response = await window.askAdmissionsAI(newHistory, userMsg, getGameDataForPhase(phase));
          const proctorMsg = response.proctorMessage || response.response || 'The Proctor nods thoughtfully...';
          setChatHistory(prev => [...prev, { role: 'proctor', text: proctorMsg }]);
          if (response.systemUpdates) applySystemUpdates(response.systemUpdates);
        } catch {
          setChatHistory(prev => [...prev, { role: 'proctor', text: 'The Biblioplex archives are currently unreachable. Please try again later.' }]);
        }
        setIsChatLoading(false);
      };

      const renderSheet = () => {
        const cls = CLASSES[selectedClass] || {};

        switch (activeSheetTab) {
          case 1: return (
            <div className="space-y-4">
              <div className="border-b-2 border-[#2c2214] pb-3">
                <h2 className="text-lg font-bold font-serif">{characterName || "Unnamed Student"}</h2>
                <p className="text-xs text-[#66543b] mt-0.5">{cls.name || "-"} 1 • {selectedCollege} • {selectedLineage} • {alignment}</p>
              </div>

              <div className="grid grid-cols-4 gap-2 mb-2">
                <div className="border-2 rounded-xl p-2 bg-red-900/10 text-center border-red-900/20">
                  <span className="text-[8px] font-bold text-red-900/70 uppercase">Max HP</span>
                  <span className="text-sm font-extrabold block text-red-900">{getMaxHP()}</span>
                </div>
                <div className="border-2 rounded-xl p-2 bg-slate-900/10 text-center border-slate-900/20">
                  <span className="text-[8px] font-bold text-slate-700 uppercase">Armor (AC)</span>
                  <span className="text-sm font-extrabold block text-slate-900">{getAC()}</span>
                </div>
                <div className="border-2 rounded-xl p-2 bg-emerald-900/10 text-center border-emerald-900/20">
                  <span className="text-[8px] font-bold text-emerald-900/70 uppercase">Initiative</span>
                  <span className="text-sm font-extrabold block text-emerald-900">{getModStr('DEX')}</span>
                </div>
                <div className="border-2 rounded-xl p-2 bg-amber-900/10 text-center border-amber-900/20">
                  <span className="text-[8px] font-bold text-amber-900/70 uppercase">Speed</span>
                  <span className="text-sm font-extrabold block text-amber-900">{LINEAGES[selectedLineage]?.speed || 30}</span>
                </div>
              </div>

              <div className="grid grid-cols-3 gap-2">
                {["STR","DEX","CON","INT","WIS","CHA"].map(stat => {
                  const score = statAssignments[stat];
                  const mod = score !== null ? Math.floor((score - 10) / 2) : null;
                  return (
                    <div key={stat} className="border-2 rounded-xl p-2 bg-[#f9f5eb] text-center shadow-sm border-[#2c2214]">
                      <span className="text-[8px] font-bold text-slate-500 uppercase">{stat}</span>
                      <span className="text-sm font-extrabold block text-amber-900">{mod !== null ? (mod >= 0 ? `+${mod}` : mod) : "-"}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
          
          case 2: return (
            <div className="space-y-4">
              <div>
                <h3 className="text-sm font-bold font-serif text-amber-900 border-b border-[#2c2214] pb-1 mb-2">Psychological Profile</h3>
                <div className="grid grid-cols-1 gap-2 text-xs">
                  <p><span className="font-bold text-slate-700">Trait:</span> {selectedTrait || "TBD"}</p>
                  <p><span className="font-bold text-slate-700">Ideal:</span> {selectedIdeal || "TBD"}</p>
                  <p><span className="font-bold text-slate-700">Bond:</span> {selectedBond || "TBD"}</p>
                  <p><span className="font-bold text-red-800">Flaw:</span> {flaw || "TBD"}</p>
                </div>
              </div>
              <div>
                <h3 className="text-sm font-bold font-serif text-amber-900 border-b border-[#2c2214] pb-1 mb-2">Official Background File</h3>
                <p className="text-xs font-serif leading-relaxed text-slate-800 bg-white/50 p-3 rounded-lg border border-[#2c2214]/10">
                  {backstory || "No backstory recorded yet."}
                </p>
              </div>
            </div>
          );

          case 3: {
            const baseCap = SPELL_CAPACITY[selectedClass] || { cantrips: 0, spells: 0 };
            const expectedCantrips = baseCap.cantrips + 2; 
            const expectedSpells = baseCap.spells + 1; 

            const allSpells = Object.values(SPELLS_BY_RESONANCE).flat();
            const cantrips = selectedSpells.filter(s => allSpells.find(x => x.name === s)?.level === "Cantrip");
            const leveled = selectedSpells.filter(s => allSpells.find(x => x.name === s)?.level === "1st-level");
            const unclassified = selectedSpells.filter(s => !allSpells.find(x => x.name === s));

            const missingCantrips = Math.max(0, expectedCantrips - cantrips.length);
            const missingSpells = Math.max(0, expectedSpells - leveled.length - unclassified.length);

            const handleAddSpell = (e) => {
              if (e.target.value && !selectedSpells.includes(e.target.value)) {
                setSelectedSpells([...selectedSpells, e.target.value]);
              }
            };
            const handleRemoveSpell = (s) => setSelectedSpells(selectedSpells.filter(x => x !== s));

            const validSpellOptions = allSpells
              .filter(s => !selectedSpells.includes(s.name))
              .filter(s => s.classes.includes(selectedClass) || s.classes.includes(selectedCollege));

            return (
              <div className="space-y-4">
                <h3 className="text-sm font-bold font-serif text-amber-900 border-b border-[#2c2214] pb-1">Grimoire & Spell Slots</h3>
                
                <div className="mb-4">
                  <p className="text-xs font-bold text-slate-700 mb-2 flex justify-between">
                    <span>Cantrips Known</span>
                    <span className="text-slate-500">{cantrips.length} / {expectedCantrips}</span>
                  </p>
                  {cantrips.map(s => (
                    <div key={s} className="flex justify-between items-center bg-white/80 p-1.5 rounded border border-[#2c2214]/10 mb-1 text-xs font-semibold">
                      {s} <button onClick={() => handleRemoveSpell(s)} className="text-red-500 hover:text-red-700"><i className="fa-solid fa-times"></i></button>
                    </div>
                  ))}
                  {Array.from({ length: missingCantrips }).map((_, i) => (
                    <select key={`c-${i}`} onChange={handleAddSpell} value="" className="w-full bg-red-900/5 border border-red-900/20 text-red-900 rounded p-1.5 mb-1 text-xs outline-none cursor-pointer">
                      <option value="" disabled>+ Empty Cantrip Slot...</option>
                      {validSpellOptions.filter(s => s.level === "Cantrip").map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                    </select>
                  ))}
                </div>

                <div>
                  <p className="text-xs font-bold text-slate-700 mb-2 flex justify-between">
                    <span>1st-Level Spells</span>
                    <span className="text-slate-500">{leveled.length + unclassified.length} / {expectedSpells}</span>
                  </p>
                  {[...leveled, ...unclassified].map(s => (
                    <div key={s} className="flex justify-between items-center bg-white/80 p-1.5 rounded border border-[#2c2214]/10 mb-1 text-xs font-semibold">
                      {s} <button onClick={() => handleRemoveSpell(s)} className="text-red-500 hover:text-red-700"><i className="fa-solid fa-times"></i></button>
                    </div>
                  ))}
                  {Array.from({ length: missingSpells }).map((_, i) => (
                    <select key={`s-${i}`} onChange={handleAddSpell} value="" className="w-full bg-red-900/5 border border-red-900/20 text-red-900 rounded p-1.5 mb-1 text-xs outline-none cursor-pointer">
                      <option value="" disabled>+ Empty 1st-Level Slot...</option>
                      {validSpellOptions.filter(s => s.level === "1st-level").map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                    </select>
                  ))}
                </div>

                <div className="text-[10px] text-slate-500 italic mt-3 bg-slate-900/5 p-2 rounded">
                  <i className="fa-solid fa-circle-info mr-1 text-indigo-400"></i>
                  Slot capacity includes Level 1 Class mechanics plus the +2 Cantrips and +1 Spell granted by the Strixhaven Initiate background feat.
                </div>
              </div>
            );
          }

          case 4: return (
            <div className="space-y-3 text-xs">
              <p className="font-bold text-amber-950 text-sm border-b border-[#2c2214] pb-1">Campus Life</p>
              <p><span className="font-bold text-slate-700">Club:</span> {CLUBS[selectedClub]?.name || "No club selected"}</p>
              <p><span className="font-bold text-slate-700">Stipend:</span> {STIPEND_KITS[selectedStipend]?.name || "None"}</p>
              <p><span className="font-bold text-slate-700">Languages:</span> Common, {selectedLanguage}</p>
              <p><span className="font-bold text-slate-700">Armor Focus:</span> {selectedArmor}</p>
              <p><span className="font-bold text-slate-700">Proficiency Bonus:</span> +2</p>
            </div>
          );
          default: return null;
        }
      };

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
            <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] pointer-events-none"></div>
            <div className="max-w-md w-full bg-slate-950 border border-amber-500/30 rounded-2xl p-8 shadow-2xl relative z-10">
              <div className="text-center mb-8">
                <i className="fa-solid fa-wand-magic-sparkles text-3xl text-amber-500 mb-3"></i>
                <h1 className="text-2xl font-bold tracking-wider text-amber-400 font-serif">STRIXHAVEN</h1>
                <p className="text-xs text-slate-400 tracking-widest uppercase mt-2">Student Portal Access</p>
              </div>

              <div className="flex gap-2 mb-6 bg-slate-900 p-1 rounded-lg">
                <button onClick={() => {setLoginMode('new'); setAuthError('');}} className={`flex-1 py-2 text-xs font-semibold rounded-md transition-all ${loginMode === 'new' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>New Enrollment</button>
                <button onClick={() => {setLoginMode('returning'); setAuthError('');}} className={`flex-1 py-2 text-xs font-semibold rounded-md transition-all ${loginMode === 'returning' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Returning Student</button>
              </div>

              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">Student ID (Username)</label>
                  <input type="text" value={portalUsername} onChange={e => setPortalUsername(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-100 focus:border-amber-500 outline-none" placeholder="e.g. RazorToe" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">Password</label>
                  <input type="password" value={portalPassword} onChange={e => setPortalPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-100 focus:border-amber-500 outline-none" placeholder="••••••••" />
                </div>
                
                {authError && <div className="text-red-400 text-xs font-bold bg-red-950/50 p-3 rounded border border-red-900/50">{authError}</div>}
                
                <button type="submit" disabled={isAuthLoading} className="w-full py-3 mt-4 bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-slate-950 rounded-lg text-sm font-bold shadow-lg transition-all">
                  {isAuthLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : (loginMode === 'new' ? "Begin Entrance Exam" : "Resume Studies")}
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col lg:flex-row h-screen relative">
          <section className="w-full lg:w-1/2 border-r border-slate-800 flex flex-col bg-slate-900/40 overflow-hidden">
            <div className="px-4 md:px-6 pt-4 md:pt-6 flex-shrink-0">
              <header className="mb-4 border-b border-amber-500/30 pb-4 flex justify-between items-start">
                <div>
                  <h1 className="text-xl font-bold tracking-wider text-amber-400 font-serif">
                    <i className="fa-solid fa-wand-magic-sparkles mr-2 text-amber-500"></i>STRIXHAVEN
                  </h1>
                  <p className="text-xs text-slate-400 tracking-widest uppercase mt-0.5">
                    Proctor Exam - Phase {phase} of 11
                  </p>
                </div>
                <div className="text-right">
                  <span className="text-[10px] text-slate-500 uppercase block">Student ID</span>
                  <span className="text-xs font-bold text-indigo-400">{portalUsername}</span>
                </div>
              </header>
              <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mt-2 mb-4">
                <div className="bg-gradient-to-r from-indigo-600 to-indigo-400 h-full transition-all duration-500" style={{ width: `${(phase / 11) * 100}%` }}></div>
              </div>
            </div>

            <div className="flex-1 flex flex-col overflow-hidden px-4 md:px-6 pb-4 pt-1">
              {renderChat()}
            </div>

            <div className="flex-shrink-0 px-4 md:px-6 py-4 border-t border-slate-800/80 flex justify-end gap-3">
              <button onClick={downloadCharacterSheet} className="px-5 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-xs font-semibold shadow-lg transition-all">
                <i className="fa-solid fa-file-arrow-down mr-2"></i>Download
              </button>
              <button onClick={() => submitToFirebase(false)} disabled={isSaving} className="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white rounded-lg text-xs font-semibold shadow-lg transition-all">
                <i className="fa-solid fa-cloud-arrow-up mr-2"></i>{isSaving ? "Syncing..." : "Force Sync"}
              </button>
            </div>
          </section>

          <section className="w-full lg:w-1/2 p-4 md:p-6 bg-slate-800/30 flex flex-col gap-3 overflow-y-auto">
            <div className="flex gap-2 border-b border-slate-800 pb-3">
              {[{ id: 1, label: "Core Stats" }, { id: 2, label: "Backstory" }, { id: 3, label: "Spellbook" }, { id: 4, label: "Campus" }].map(tab => (
                <button key={tab.id} onClick={() => setActiveSheetTab(tab.id)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${activeSheetTab === tab.id ? "bg-amber-500 text-slate-950" : "bg-slate-950 text-slate-400 border border-slate-800 hover:border-amber-500/40"}`}>
                  {tab.label}
                </button>
              ))}
            </div>
            <div className="flex-1 bg-[#fdfaf2] text-[#2c2214] p-5 rounded-2xl border-4 border-[#ded1ba] overflow-y-auto shadow-inner">
              {renderSheet()}
            </div>
          </section>

          <div className="fixed bottom-2 left-3 text-[10px] text-slate-500 font-mono pointer-events-none z-50 opacity-50">
            v1.5.0 - Backstory & Spellbook Fix
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
